body:
  text: 救荒活民書拾遺宋董煟撰貞元九年鹽鐡使張滂奏去嵗水災減稅用度不足請稅茶以足之自明年以往稅茶之錢令所在别貯俟有水旱以代民田稅自是嵗收茶稅錢四十萬緡未嘗以救水旱煟曰張滂初請稅茶本欲别貯其錢俟有水旱代民田租其建議非不善德宗收稅錢後已不能行故當時陸贄亦謂嵗收五十萬緡未嘗以救水旱比年𣙜貨務上言茶鹽稅錢額二千萬緡今每遇水旱盍亦推原鹽茶之本意少捐數十萬緡以濟之可乎梁末侯景作亂江南連年旱蝗江揚尤甚百姓流亡相與入山谷江湖採草根木葉菱芡而食之所在皆斃死者蔽野富室無食皆烏面鵠形衣羅綺懷金玉俯伏床帷待命聽終千里絶煙人迹罕見白骨聚如丘山煟曰春秋之時戰爭相尋秦晉之飢猶且乞糴梁末旱蝗土宇雖狹盜賊雖起然百里之地猶足以朝諸侯况據大江之南乎時宇文泰在魏方講行府兵有惠養黎元之志儻走一介賫寶玉以告滯積仍乞護送彼以生民為念其忍坐視而弗救乎惜也梁之君臣昏庸不知布德施惠百姓轉死乎溝壑甚至衣羅錦懷金玉以待盡悲夫大業七年煬帝謀討髙麗發民夫運米積於瀘河懷逺耕稼失時田疇多荒飢饉荐臻穀價湧貴米斗直數百錢所運米或粗惡令民糴以償之重以官吏侵漁不知困窮財力俱竭安居則不勝凍餒剽掠則猶得延生於是始相聚為羣盜煟曰自古盜賊之起未嘗不始於飢饉上之人不惜財用知所以賑救之則庶幾其少安不然鮮有不殃及社稷者况夫軍旅之後必有凶年耕稼失時田疇多荒民力殊難也於此猶欲以和糴抑配之可不鑒乎十四年煬帝幸江都郡縣競刻剝以充貢獻外為盜賊所掠內為郡縣所賊生計無遺加之飢饉無食始採木皮葉或搗藁為末或煮土而食之然官廩猶充牣吏皆畏法莫敢賑救煟曰張官置吏本以為民今吏皆畏法莫敢賑救是必上之人諱聞荒歉也以荒歉為諱者其禍至此然天子者民之父母也子既飢餓父母其忍坐視乎今民至採木皮搗藁末以充飢腸而上猶不知煬帝不亡何待哉隋末河南山東大水餓殍滿野死者數萬人徐世績言於李密曰天下大亂本為飢饉今更得黎陽倉大事濟矣密遣世績於黎陽開倉恣民就食煟曰為人上者平居暇日其所貯積正為斯民飢饉計爾不知發廩賑恤乃至英雄散之以沽譽迹其禍患可不鑒歟然嘗觀密至洛口倉散米無防守取之者隨意多少或就倉之後力不能致委棄衢路自倉城至郭門米厚數寸為車馬所躪踐羣盜來就食者并家屬近百萬口無甕盎織荆筐淘米洛水西岸千里之間望之如白沙密喜謂賈閏甫曰此可謂足食矣噫食也者民所賴以為命而輕棄若此使密得志豈生靈之福歟隋末馬邑太守王仁恭不能賑施劉武周欲謀作亂宣言曰今百姓飢饉僵尸滿道王府君閉倉不賑抑豈為民父母之意衆皆憤怒武周稱疾卧家豪傑候問武周椎牛縱酒因大言曰壯士豈能坐待溝壑倉粟閉積誰能與我共取之豪傑皆許諾未幾以計斬仁恭郡中無敢動者開倉賑貧民境內屬城皆下之煟曰飢饉而不發廩往往姦雄多假此號召百姓以倡亂臣觀義寧元年左翊衛郭子和坐徙榆林會郡中大飢子和潛結敢死士十八人執郡丞王才數以不恤百姓之罪斬之開倉賑施此雖盜賊之行不足汚齒頰然亦足以為不留意賑恤者之戒天寶十三年水旱相繼關中大飢楊國忠惡京兆尹李峴不附已以災沴歸咎於是貶長沙太守上憂雨傷稼國忠取禾之善者獻之曰雨雖多不害稼也上以為然扶風太守房琯言所部水災國忠使御史推之是嵗天下無敢言災者髙力士侍側上曰淫雨不已卿可盡言對曰自陛下以權假宰相賞罰無章隂陽失度臣何敢言上默然煟曰自古姦臣固位惟欲諂事人主不樂聞四方水旱盜賊之警故多為掩遏之計不知稔成禍基非國之福孟子曰入則無法家拂士出則無敵國外患者國恆亡是欲使人主常懷恐懼也况水旱不恤民心日離國忠不學無術何足以知之唐盧坦為宣歙觀察使到郡嵗飢穀價日增或請損之坦曰所部土狹穀少仰四方之來者若價賤穀不復來益困矣既而商米輻湊市估遂平民賴以生煟曰不抑價則商賈來此不易之論昧者反之其意止欲沽譽不知絶市無告糴之所適以召變而起謗也坦有定見如此哉除蝗條令淳熙敕諸蟲蝗初生若飛落地主鄰人隱蔽不言耆保不即時申舉撲除者各杖一百許人告當職官承報不受理及受理而不即親臨撲除或撲除未盡而妄申盡靜者各加二等諸官私荒田收地同經飛蝗住落處令佐應差募人取掘蟲子而取不盡因致次年生發者杖一百諸蝗蟲生發飛落及遺子而撲掘不盡致再生長者地主耆保各杖一百諸給散捕取蟲蝗穀而減尅者論如吏人鄉書手攬納稅受乞財物法諸係公人因撲掘蟲蝗乞取人户財物者論如重祿公人因職受乞法諸令佐遇有蟲蝗生發雖已差出而不離本界者若緣蟲蝗論罪並依在任法煟竊謂本朝捕蝗之法甚嚴然蝗蟲初生最易捕打往往村落之民惑於祭拜不敢打撲以故遺患未已是未知姚崇倪若水盧懷慎之辨論也臣今録於後或遇蝗蝻生發去處宜急刋此作手榜散示煩士夫父老轉相告諭亦開曉愚俗之一端也開元四年山東大蝗民祭拜坐視食苖不敢捕宰相姚崇奏云秉彼蟊賊付畀炎火此古除蝗義也乃出御史為捕蝗使分道殺蝗汴州刺史倪若水上言除天災者當以德昔劉聰除蝗不克而害愈甚崇移書誚之曰聰偽主德不勝妖今妖不勝德古者良守蝗避其境今坐視食苗因以無年刺史其謂何若水懼乃縱捕得蝗十四萬石時議者喧譁帝疑復問崇曰庸儒泥文不知變且討蝗縱不能盡不愈於養以遺患乎帝然之盧懷慎曰凡天災安可以人力制也且殺蝗多必戾和氣崇曰昔楚王吞蛭而厥疾瘳叔敖斷蛇而福乃降今蝗幸可驅若縱之穀且盡殺蟲救人禍歸於崇不以諉公也蝗害遂息捕蝗法一蝗在麥苗禾稼深草中者每日侵晨盡聚草梢食露體重不能飛躍宜用筲箕褚栲之類左右抄掠傾入布袋或蒸或焙或澆以沸湯或掘坑焚火傾入其中若只瘞埋隔宿多能穴地而出不可不知一蝗最難死初生如蟻之時用竹作搭非惟擊之不救且易損壞莫若只用舊皮鞋底或草鞋舊鞋之類蹲地摑搭應手而斃且狹小不損傷苗稼一張牛皮或裁數十杖散與甲頭復收之北人聞亦用此法一蝗有在光地者宜掘坑於前長濶為佳兩旁用板及門扇接連八字鋪擺却集衆用木板發喊趕逐入坑又於對坑用掃帚十數把俟有跳躍而上者復掃下覆以乾草發火焚之然其下終是不死須以土壓之過一宿乃可一法先燃火於坑然後趕入一捕蝗不必差官下鄉非惟文具且一行人從未免蠶食里正其里正又只取之民户未見除蝗之利百姓先被捕蝗之擾不可不戒一附郭鄉村即印捕蝗法作手榜告示每米一升換蝗一斗不問婦人小兒携到即時交支如此則回環數十里內者可盡矣一五家為甲姑且警衆使知不可不捕其要法只在不惜常平義倉錢米博換蝗蟲雖不驅之使捕而四逺自輻湊矣然須是稽考錢米必支儻或減尅邀勒則捕者沮矣國家貯積本為斯民今蝗害稼民有餓殍之憂譬之賑濟因以捕蝗豈不勝於化為埃塵耗於鼠雀乎一燒蝗法掘一坑深闊約五尺長倍之下用乾柴茅草發火正炎將袋中蝗蟲傾下坑中一經火氣無能跳躍此詩所謂秉畀炎火是也古人亦知瘞埋可復出故以火治之事不師古鮮克有濟誠哉是言右件雖不仁之術倘不屏除則遺種昌熾誠何以堪姚崇所謂殺蟲救人禍歸於崇不以諉公真賢相識見也李珏賑濟法將災傷都分作四等抄劄仁字係有産稅物業之家義字係中下户雖有産稅災傷實無所收之家禮字係五等下户及佃人之田并薄有藝業而飢荒難於求趁之人智字係孤寡貧弱疾廢乞丐之人除仁字不係賑救義字賑糶禮字半濟半糶信字全濟並給厯計口如常法惟濟米預散榜文十日一次委官支毗陵與鄱陽常行此法民至於今稱之鄱陽賑救法丁卯鄱陽旱暵憲使李珏招臣措置荒政李昔守毗陵賑救有聲臣見約束簡明無俟更改但乞將義倉米每日就城中多置場減價出糶先救城內外之民却以此錢納價計口逐月一頓支給以濟村落之民非惟深山窮谷皆沾實惠且免減竊拌和之弊一物兩用其利甚博會李不權州臣迫官期出局故行之未免作輟良可嘆息或謂賑飢給錢非法令所載臣曰此庸儒之論且村民得錢非惟取贖農器經理生業以係其心又可抽贖種子收買糴斛和野菜煮食一日之糧可化為數日之糧豈不簡便已上見中卷賑濟條不俟勸分村落有米法發米下鄉般運水腳減竊拌和弊端非一故今稅户等第認米謂之勸分非惟抑配擾民且適啓閉糴今莫若責隅官交領常平錢逐都給與所保土户每都數千緡隨都分大小增損令於豐熟處循環收糴米豆歸鄉置場隨時價出糶麥熟日以本錢還官飢荒甚處賑至小熟官不抑價只認都內有米其領錢不興販及興販而不歸本鄉糶者皆有罰利之所在人自樂為富室亦恐後時爭先發廩矣何必勸分擾擾雜記條畫一尋常官司賑濟初無竒策只下保抄劄丁口姓名云已勸分到若干數目用好紙裝寫數本申諸司此是故紙救荒徒擾百姓實無所益今宜革之供報上司只用幅紙申述施行之方可也一抄劄最當留意急則鹵莽多遺落緩則玩弛不及事其間有多徇私意者須明賞罰以勵之斷在必行不當姑息仍多出手榜嚴行禁約更用蘇次參實粘姓名口數於門首之法一檢點抄劄須逐縣得人以行之然其法繁瑣姦弊最多若夫要法有三城市則減價出糶常平米村落則一頓支散義倉錢解見於前其不係賑濟之人則有逐都上户領錢興販循環糶糴之法簡要便民無踰於此一近臣寮劄子官司平日預先抄劄五家為甲有死亡遷徙當月里正申縣改正此意亦善今用四等之法每知縣到任責令用心抄劄存留當縣以備緩急庶免臨期里正賣弄之弊一遇荒歉按籍可憑賑救矣一臣嘗親任州縣救荒不先措置臨時倉卒鞭撻里正抄劄大段鹵莽逮抄劄既畢未見施行村民扶携入郡請米官司米即支散褁糧既竭餒死紛然是以賑濟之名誤其來而殺之也亦有詐作流民經過請乞官吏多厭煩之然此皆飢窮實非得已官司積藏本為斯民正當矜憐豈可坐視今凡賑恤須預印手榜曉諭以見行措置發錢米下鄉未可輕動恐名籍紊亂反無所得庶革飢貧雲集之弊一昨江東運判俞亨宗賑濟踏殺婦人一百六十二人乞待罪是未知分場分隊逐隊用旗引之法徐寧孫建蘇次參皆有成式似可通變而行大抵百人已上便慮冗雜不可平日無紀律者况飢羸之軀易蹂踐乎一徽州婺源東門縣學前姓胡人平日不以賑恤為念出納斗稱大小不同開禧丙寅五月坐閣上閲簿書忽震雷擊死簿書焚毁斗稱剖折其妻為神物提下肢體無傷閭巷之人皆知之淳熙八年敇浙西常平司奏本路去嵗旱傷輕重不均在法五分以上方許賑濟今來逐縣各鄉都分有分數不等若以統縣言之則不該賑濟若據各鄉都分有旱至重去處則理當存恤除已逐一從實括責五分以上量行賑濟五分以下量行賑糶得旨依煟曰飢荒大小不同儻不分都分等降則惠不均而力不給今五分已上賑濟五分已下賑糶其法固簡易然三分以下都分貧弱狼狽之人亦多不若四等抄劄為均濟也代宗廣德中嵗大飢蕭復家百口不自振議鬻昭應墅宰相王縉欲得之使其弟絃説曰以君之才宜在左右胡不以墅奉丞相取右職復曰鬻先人之墅以濟孀單吾何用美官使門內寒且餒乎縉憾之由是坐廢數嵗改同州刺史嵗歉有京畿觀察使儲粟復發之以貸百姓有司劾治詔削停刺史或弔之復曰茍利於人胡責之辭其後拜兵部尚書煟曰官職自有定分以巧得之不若拙而見稱於後世蕭復以墅奉宰相豈不立取富貴不發觀察使儲粟豈至削停刺史然一時齟齬其後亦為兵部尚書豈非官職自有分定雖巧何益耶後之賑濟者但當誠心為民可行即行一己利害非所當計儀鳯間王方翼為肅州刺史蝗獨不至方翼境而鄰郡民或餒死皆重繭走方翼治下乃出私錢作水磑簿其直濟飢瘵起舍數十百楹居之全活甚衆煟曰流民至當為法以處之富弼令樵採打魚之數地主不得為主是也但一時未免侵擾莫若修堤浚河興水利公私兩便不然官司出錢租賃民間蘆場或柴蓧山近縣郭市各去處縱流民樵採官復置場買之非惟流民得自食其力雪寒平價出賣亦可濟應細民南楚新聞孫儒之亂米斗四十千將金玉換易僅得一撮一合謂之通腸米言飢人不可食他物惟廣煎水飲可以稍通腸胃煟曰昔唐兵圍洛陽城中乏食民食草根木葉皆盡相與澄浮泥投米屑作餅食之皆病身腫腳弱死者相枕倚蓋久飢腸胃噎塞乍飽多死惟米飲可以通腸嘗記乾道間江西大飢民有食白膳土築殺者時帥出勸農飢民入狀借錢販糶度荒帥判云紛紛黨與立三朝五十餘年積未消野老不知當日事尚持片紙覔青苗當時若責上户領錢往他處收買雜斛循環糶糴以救飢民未必若此也惜哉馬尋明習法律皇祐四年知襄州會嵗飢或羣入人家掠園粟獄吏鞫以強盜尋曰此脫死耳其情與為盜異奏得減死論遂著為例煟曰荒政除盜亦當原情頃有尹京者以死囚代為盜者沉之於江此最為得策蓋凶荒之年強有力者好倡亂須當有以聳動之使逺邇自肅之為上不然則羣聚而起殺傷多矣隋末河內飢人相食李軌興義兵僣稱帝號傾家財以賑之不足欲發倉粟召羣臣議曹珍等曰國以民為本豈吝倉粟坐視委死乎時有隋官心不服排珍曰百姓飢者自是羸弱勇壯之士終不至此國家倉粟以備不虞豈可散之以餉羸弱僕射苟恱人情不為國計非忠臣也軌以為然由是士民離散尋致敗煟曰李軌飢賊耳固不足論然行反間者多倡為倉粟不可散之説使失士民之心况夫萬乘之主欲為根本慮者豈愛惜倉粟坐視百姓死亡乎建州甌寧縣有洞曰回源其北與建陽接境乃建炎初劇賊范汝為竊發之地民性悍而習為暴小遇飢饉羣起剽掠去嵗因旱凶民社八子乘時嘯聚首破建陽逐官吏殺居民至夏張大一李大二復於洞中作過本路帥臣仍嵗遣官軍蕩定時進士魏掞之謂民易動蓋緣艱食乃請於提舉常平官得米一千六百石以貸鄉民至冬而取逺置倉於邑之長灘鋪自後每嵗散斂如常民得以濟不復思亂而草冦遂息人謂掞之所請乃社倉遺意使諸鄉各有倉儲粟則緩急可恃矣煟曰社倉乃公私儲積救濟小民使兼併者無所肆其侵漁之心儻天下郡邑諸鄉皆能行之為利甚博今列社倉規約於後朱熹社倉奏請淳熙八年十一月浙東提舉朱熹奏臣所居建寧府崇安縣開耀鄉有社倉一所係乾道四年鄉民艱食本府給常平米六百石委臣與土居朝奉郎劉如愚同共賑貸至冬收到元米次年夏間本府復令依前貸與人户冬間納還臣等申府措置每石量收息米二斗自後逐年從此斂散或遇少歉即蠲其息之半大歉則盡蠲之至今十有四年量支息米造成倉厫三間收貯已將元米六百石納還本府其見管三千一百石並是纍年人户納到息米已申本府照會人衆依前斂散更不收息每石只收耗米三升係臣差本鄉土居官及士人數人同共掌管遇斂散時即申府差縣官一員監視出納以此之故一鄉四五十里之間雖遇凶年人不闕食竊謂其法可以推廣行之他處而法令無文人情難保妄意欲乞聖慈特依義役體例行下諸路州軍曉諭人户有願依此置立社倉者州縣量支常平米斛責與本都上富等人户主執斂散每石收米二斗仍差本都土居或寄居官員士人有行義者與本縣同共出納收到息米十倍本米之數即送元米還官却將息米斂散每石只收耗米三升其有富家情願出米本者亦從其便息米及數亦與撥還如有鄉土風俗不同者更許隨宜立約申官遵守實為久逺之利其不願置立去處官司不得抑勒則亦不至紛擾此在今日言之雖無濟於目前之急然實公私儲蓄預備久逺之計人必願從者伏望聖慈詳察施行聖旨户部看詳聞奏本部看詳欲行下諸路提舉司隨下本路諸州縣曉示任從民便如照依上件施行而本鄉土居或寄居官員有行義者具狀赴本州縣自陳量於義倉米內支撥其斂散之事與本鄉耆老公共措置州縣並不得干預抑勒十二月日三省回奉聖旨依户部看詳到事理施行崇安社倉條約一逐年二月分委諸都社首保正副將舊保簿重行編排産錢六百文以上及有營運衣食不缺之人即注不合請米字外有合請米人户即仰詢問願與不願請米各令親押字三月內將所排保簿赴官交納鄉官點檢抽摘審問仍出榜許人告首如有漏落及新添一户一口不實即申縣根治如無欺弊即與支貸一逐年五月下旬前後新陳未接之際預於四月上旬申縣乞依例支貸一申縣訖一面出榜排定日分分都支散先逺後近曉示人户各依日限具狀狀內開説大人小兒口數結保每十人為一保遞相委保如保內有逃亡之人同保均備取定十人以下不成保不支正身赴倉請米仍仰社首保正副隊長並各赴倉識認面目照對保簿如無偽冒重疊即與全押保明其日鄉官同入倉據狀支散給關子具本息耗米數付令收執一人户所貸官米至冬納還不得過十一月下句先於十月上旬定日申縣乞差吏斗前來收納兩平交量每石收息米二斗小歉除息之半大歉全免收息候滿十年以本米送還元借官司每石量收耗米三升凖備折閲及支吏斗等人飯米其米正行附厯收支每遇支散交納日本縣人吏一名斗子一名倉子兩名每名支飯米一斗鄉官并人役每名支飯米五升人從每位不過二人金華縣社倉規約社倉穀本五百石社倉只置都簿一面紙盡置第二面一甲不許過三十人甲頭一人不滿十人附甲不許詭名冒借犯者出社甲頭改替許同甲告罰甲頭所納給賞散穀以三時謂除夜或舊不接新並須甲頭相度一户借一户甲頭倍之無居止及有藝人不借若口纍家多作田廣甲頭保明别議增倍借穀上簿不立契還穀就簿內銷借穀日每户納錢五十文甲頭免十五文給甲頭十文守倉人十文雜支十五文掌倉量錢此外不許分文乞索許甲內人告以所得錢支賞量穀本甲甲頭執概並見清量掌倉分擅執概改替選以三限限以三日謂如十甲每甲若干人一限納若干並甲頭預報定日子一人不到甲內穀並留倉候足交量息穀二分謂石取息二斗中飢減半大飢盡免本户納息已滿十年免收息謂第一年納至十一年免耗穀三釐謂穀一石取耗三升以備折閲及充每嵗社倉雜費甲內逃亡甲頭同甲內均填甲頭倍之若係時疾户絶甲頭申倉差人審實候還穀日銷落若不循理者雖已還出社息穀有餘遇飢荒給散許所有每人大人二升小兒一升十日止並以户口為定社衆於規約犯一事不借一年再犯出籍清江縣社倉規約一所給借貴均平亦慮失陷米本其支借時鄉官審問社首及甲內人某人可借若干衆以為可方可支借其素號遊手及雖農業而衆以為懶惰頑慢者亦不支貸一鄉官踏逐善書寫百姓一人不得用罷任過犯人專充書寫簿書如收支執概就差社首遇收支日日支飯米一斗一倉中事務並委鄉官掌管但差使保正編排人户驅磨簿厯彈壓斂散踏逐倉厫追斷逋負之類須官司行遣於縣官內擇一時可委之人以司其事一鄉官從本軍給帖及木朱記主執行遣一籍厯紙札每嵗於息內支破煟曰社倉規約雖不同使天下郡邑皆能欽此意以行之雖有水旱民不困乏矣救荒活民書拾遺
