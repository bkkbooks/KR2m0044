body:
  text: 救荒活民書政書類三邦計之屬提要臣等謹案救荒活民書三卷宋董煟撰煟字季興鄱陽人紹熙五年進士嘗知瑞安縣是書前有自序謂上卷考古以證今中卷條陳救荒之䇿下卷備述本朝名臣賢士之所議論施行可為法戒者書中所叙如以常平為始自隋義倉為始自唐太宗皆不能逺考本原然其載常平粟米之數固隋書所未及志也其宋代蠲免優恤之典載在宋史紀志及文獻通考續通鑑長編者此撮其大要不過得十之二三而當時利弊言之頗悉實足補宋志之缺勸分亦宋之政令史所失載而此書有焉他若減租代種淳熙恤災令格皆可為史氏拾遺而宋代名臣救荒善政亦多堪與本傳相參證猶古書中之有禆實用者也乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀救荒活民書原序臣聞水旱霜蝗之變何世無之然救荒無術則民有流離餓莩轉死溝壑之患臣不才幼嘗竊慕先朝冨弼活河朔飢民五十餘萬私心以為賢於中書二十四考遠矣困處閭閻熟覩民間利病與夫州縣施行之善否心口相誓異時獲預從政願少攄活民之志於是編次厯代荒政釐為三卷上卷考古以證今中卷條陳今日救荒之策下卷則備述本朝名臣賢士之所議論施行可鑒可戒可為矜式者以備緩急觀覽名曰救荒活民書然半生竒蹇晚叨一第而憂患薰心齒髮疏落深恐蒲栁之資不任風雪則臣之素志無由獲伸謹繕寫進呈伏望聖慈萬幾餘閒俯賜乙夜之覽儻或可備採擇乞賜睿㫖頒行州縣庶幾上助九重惠澤黎元之萬一云臣誠惶誠恐頓首頓首從政郎臣董煟上進救荒活民書原序
