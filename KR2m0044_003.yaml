body:
  text: 救荒活民書卷下宋董煟撰救荒雜説臣嘗謂救荒之政有人主所當行者有宰執所當行者有監司太守縣令所當行者監司守令所當行人主宰執之所不必行人主宰執之所行又非監司太守縣令之所宜行今各條列於后人主救荒所當行一曰恐懼修省二曰減膳徹樂三曰降詔求直言四曰遣使發廩五曰省奏章而從諫諍六曰散積藏以厚黎元宰執救荒所當行一曰以燮調為己責二曰以飢溺為己任三曰啓人主警畏之心四曰慮社稷顛危之漸五曰陳緩征固本之言六曰建散財發粟之策七曰擇監司以察守令八曰開言路以通下情監司救荒所當行一曰察鄰路豐熟上下以為告糴之備二曰視部內旱傷大小而行賑救之策三曰通融有無四曰紏察官吏五曰寬州縣之財賦六曰發常平之滯積七曰無崇遏糴八曰毋啓抑價九曰無厭奏請十曰無拘文法太守救荒所當行一曰稽考常平以賑糶二曰凖備儲蓄以賑濟三曰視州縣三等之飢而為之計小飢則勸分發廩中飢則賑濟賑糴大飢則告朝廷截上供乞度牒乞鬻爵借內庫錢為糴本四曰視鄰郡三等之熟而為之備才覺旱潦先發常平錢遣牙吏於鄰郡豐熟處告糴以備賑糶米豆雜料皆可五曰申明遏糴之禁六曰寬弛抑價之令七曰計州用之虛盈存下一歲官吏支遣餘皆以救荒不給則告糴他郡八曰察縣吏之能否縣令不職劾罷則有迎送之費姑委佐官以輔之不然對移他邑之賢者九曰委諸縣各條賑濟之方十曰因民情各施賑救之術十有一曰差官祈禱十有二曰存恤流民十有三曰早檢放以安人情十有四曰預措備以寬州用十有五曰因所積以濟民飢十有六曰散藥餌以救民疾縣令救荒所當行一曰聞旱則誠心祈禱二曰已旱則一面申州三曰告旱不可邀阻四曰檢旱不可後時五曰申上司乞常平以賑糶六曰申上司覔義倉以賑濟七曰勸巨室之發廩八曰誘富民之興販九曰防滲漏之姦十曰戢虛文之弊十有一曰聽客人之糶糴十有二曰任米價之低昻十有三曰請提督十有四曰擇監視十有五曰參考是非十有六曰激勸功勞十有七曰旌賞孝弟以勵俗飢荒之年有骨肉不相保者今婦有遜食於姑孫能養其祖父母者密物色之十有八曰散施藥餌以救民飢荒之際必有疾病十有九曰寬征催二十曰除盜賊田錫論救災臣近見滄州奏全家飢死一十七口雖有指揮下轉運司相度減價賑糶却未見别有指揮若有司只如此行道實未稱陛下憂勞之心陛下為民父母使百姓飢死乃是陛下辜負百姓也宰相調燮隂陽啓導聖德而惠澤不下流王道未融明是宰相辜負陛下也今陛下何不引咎如禹湯罪已降玉音下飢餓州府使民心知陛下憂恤然後賑廩給貸人以救其死若倉廩虛而饋運不足日即無可給貸則是執政素不用心所致昔伊尹作相恥一夫不獲今餓死人如此所謂焉用彼相今陛下可將此事略面責宰相觀其何辭以對待三日而後無所建明不拜章求退疑忍人也忍人而猶相之是陛下不以百姓為心矣若不别進用賢臣恐危亂之萌將來滋蔓語曰十室之邑必有忠信况皇家富有萬國豈無人焉可於常參官自來五日一轉對中觀其所上之言有逺大謀略經綸才業者可以非次擢用不然臣恐國家未能早致太平也畢仲遊救荒耀州大旱野無青草仲遊謂郡縣賑濟多後時力愈勞而民不救故先民之未飢多揭榜示曰郡將賑濟且平糴若干萬石實大張其數勸諭以無出境民皆歡然安堵已而果漸艱食乃出粟以賑且平糴以給之鄰境流散殆盡而耀民之當徙就食者乃十七萬九千口顧所發粟不及萬石以民粟繼之而家給人足無一人逃者監司乃故搜於長安得二人焉曰此耀之流民也送還郡仲遊驗問皆中民之逐利者所賫持自厚即非流民監司愧沮滕達道賑濟滕達道知鄆州嵗方飢乞淮南米二十萬石為備後淮南東京皆大飢達道獨有所乞米召城市富民與約曰流民且至無以處之則疾疫起併及汝矣吾得城外廢營田欲為席屋以待之民曰諾為屋二千五百間一夕而成流民至以次授地井竈器用皆具以兵法部勒少者炊壯者樵婦女汲民至如歸上遣工部侍郎王古按視廬舍道巷引繩碁布肅然如營陳古大驚圖上其事有詔褒美所活者凡五萬人吳遵路賑濟民既俵米即令採薪芻出官錢收買却於常平倉市米物歸贍老稚凡買柴二十二萬束比至嚴冬雨雪市無束薪即依元價化鬻官不傷財民再獲利又以飛蝗遺種勸種豌豆民卒免艱食之患其説已見捕蝗門文彥博減價糶米文彥博在成都米價騰貴因就諸城門相近寺院凡十八處減價糶米仍不限其數張榜通衢翌日米價遂減前此或限升斗出糶或抑市井價值適足以增其氣熖而價終不能平大抵臨事須當有術臣謂此非特能止騰湧亦以陳易新之法也韓琦平價濟村民韓琦論自來常平倉遇年歲不稔物價稍髙合減元價出糶出糶之時令諸縣取逐鄉近下等第户姓名印給關子令收執赴倉每户糶與三石或兩石惟是坊郭則每日零細糶與浮居之人每日五升或一斗故民受實惠甚濟飢乏即未曽見坊郭有物業人户乃來零糶常平倉斛斗者前賢處事精審如此臣謂穀可留而米不可久留若過三年以上則不可食不於飢荒之時糶錢他日易新則終化埃塵而已彭思永賑救水災彭思永通判睦州會海水夜敗台州城郭人多死詔監司擇良吏往撫之思永選行將至吏民皆號訴於道思永悉心救養不憚勞苦至忘寢食盡葬溺死者為文以祭之問疾苦賑飢乏去盜賊撫羸弱其始至也城無全舍思永周行相視為之規畫朝夕暴露未嘗憩息民貧不能營葺者命工伐木以助之數日而公私舍畢完人復安其居思永視故城頺壞僅有髣佛思為逺圖召僚屬而謂之曰郡瀕海而無城此水所以為害也當與諸君圖之程役勸功民忘其勞城遂為永利天子嘉之錫書奬諭後去台還睦二州之民喜躍啼戀者交於道吕公著賑濟元祐三年冬頻雪民苦寒多有凍死者吕公著為相日與同列議所以救禦之術乃發官米炭遣官數十分置場於京師賤鬻以惠貧民又出內庫錢十萬緡委開封府官吏走遍閭閻周視而賑之又遣官按視四福田院存撫丐者給以日廩須春暮而止農民貸種糧流移在道者所過州縣存恤寓以官舍續其食流配罪人隨所在寄禁亦委官吏安存之或為饘粥湯藥以救疾或為氊笠綿衣以禦寒民有棄老稚於路者皆設法救養之凡待賑而活者一路或數十萬口賴貸以濟者又倍焉曽鞏勸諭賑糶曽鞏知越州嵗飢度常平不足以賑給而田居野處之人不能皆至城郭至者羣聚有疾癘之虞前期諭屬縣召富人使自實粟數總得十五萬石視常平價稍增以豫民民得從便受粟不出田里而食有餘粟價自平又出粟五萬貸民為種糧使隨處賦入官農事賴以不乏臣曰此策固善但視常平價稍增則視時價必稍損矣恐成科抑非本朝詔旨不若前期勸諭商賈富民出錢循環糶販之為愈亦須官司先有以表率之范祖禹乞常平糴本元祐三年范祖禹言今以常平所有之錢收糴亦未廣陛下誠能出內庫金帛數十萬以為糴本專備水旱凶荒發斂以時則官本常存而民被惠澤無窮矣濟民之惠無大於此况祖宗內藏庫本備軍旅非常之用仁宗常出錢一百萬緡以供常平糴本此仁惠所以深結於民心夫財出於民復以濟民但使民存不致流亡則今年散之明年復有何患無財也蘇軾乞糶官米出糶官米雖是數目浩瀚然止於糶買不失官本亦易應副但令浙西官場糶米不絶直至來年十月終則雖天災流行不能盡害陛下赤子也如蒙施行即乞先降手詔令監司出榜曉諭軍民令一路曉然知朝廷已有指揮令發運司將上供對樁斛斗應副浙西諸郡糶米直至明年七月終不惟安慰人心破姦雄之謀亦使蓄積之家知不久官米豆至自然趁時出賣所濟不少惟望聖明深愍一方危急早賜施行程珦遇水種豆程珦知徐州沛縣會久雨平原出水穀既不登晚種不入民無卒歲珦謂俟可耕而種時已過矣乃募富家得豆數十石以貸民使布之水中水未盡涸而甲巳露矣是時遂不艱食王曽論水災宜寬賦天聖五年八月河北大水上謂輔臣曰比令內侍往沿邊視水災如聞有龍堰於海口可遣致祭王曽對曰邊郡數大水正洪範所謂不潤下之證海口恐非龍堰宜寬民賦以應天災於是下詔河北水災州軍免今年秋稅謝絳論救蝗竊見比日蝗蟲亘野坌入郛郭而使者數出府縣監捕驅逐蹂踐田舍民不聊生謹按春秋書螟為哀公賦斂之虐又漢儒推蝗為兵象臣願令公卿以下舉州府守臣而使自辟屬縣令長務求方略不限資格然後寬以約束許便宜從事期年條上理狀參考不誣奏之朝廷旌賞録用以示激勸范鎮論救荒范鎮知諫院言今歲荒歉朝廷為放稅免役及開常平倉軍食拯貸存恤不為不至然而人民流離父母妻子不能相保者平居無事時不能寬其力役輕其租賦雖大熟使民不得終嵗之飽及小歉雖重施固已無及矣此無他重斂之政在前故也臣竊以為水旱之作由民生不足憂愁無聊之歎上薄天地之和耳程頥論賑濟不制民之産無儲蓄之備飢而後發廩以食之廩有竭而飢者不可勝濟也今不暇論其本且救月前之死亡惟有節則所及者廣常見今時州縣濟飢之法或給之米豆或食之粥飯來者與之不復有辨中雖欲辨之不能也穀貴之時何人不願得倉廩既竭則殍死者在前無以救之矣雞鳴而起親視俵散官吏後至者必責怒之於是流民歌詠至者日衆未幾穀盡殍者滿道愚嘗矜其用心而嗤其不善處事救飢者使之免死而已非欲其豐肥也當擇寬廣之處宿戒使辰入至巳則闔門不納午而後與之食申而出之給來者午時出日得一食則不死矣其力自能營一食者皆不來矣比之不擇而與者當活數倍之多也凡濟飢當分兩處擇羸弱者作稀粥早晚兩給勿使至飽使氣稍平然後一給第一先營寬廣居處切不得令狼籍如作粥飯須官員親嘗恐生及入石灰或不給浮浪遊手無此理也平日當禁遊惰至其飢餓哀矜則一也此論固髙但日與一食恐飢民易成疾痛未甚為穩李之純論糶不可廢李之純為成都路運判時成都每嵗官出米六萬斛減其直出糶以濟貧民議者謂幸民而損上詔下其議之純曰成都蜀部根本民恃此為生百年矣茍奪之將轉徙無所不至願仍舊貫議遂格王堯臣乞飢民減死堯臣知光州嵗大飢羣盜發民倉廩吏以法當死堯臣曰此飢民求食爾荒政之所恤也乃請以減死論其後遂以著令至今用之真宗時陳從易知處州時歲飢有持杖盜發囷倉者請一切減死論於是全活千餘人劉彛給米收棄子劉彛所至多善政其知處州也會江西飢歉民多棄子於道上彛揭榜通衢召人收養日給廣惠倉米二升每月一次抱至官中看視又推行於縣鎮細民利二升之給皆為字養故一境生子無夭閼者朝補之活飢民葬遺體朝補之知齊州歲飢河北流民道齊境不絶補之請粟於朝得萬斛乃為流民者治舍次具器用人既集居又且日給麋粥藥物補之皆躬臨治之凡活數千人擇髙原以葬死者男女異墟使者頗􅎱其功欲有以撓之既至境按視乃更嘆服劉安世救荒劉安世請刪常平之法將一路所有錢衮同應副一路之中不得偏聚一州一州之境不得偏聚一縣各隨户口之多寡以置糶此通融有無之法但今亦艱行然為政者當識前輩規模廣大不局一隅之意范純仁救荒法范純仁為襄邑宰因歲大旱度來年必歉於是盡籍境內客舟誘之運粟許為主糶明春客米大至而邑人遂賴以無飢折克柔保借米賑貸熙寧七年知河東府折克柔奏今嵗河外飢饉雖蒙賑貸尚未周給人欲流散必求生路恐北人因而招誘遂虜北邊民户臣乞保借米三萬石粟二萬石賑貸俟熟令償詔賜省倉粟二萬石賑濟米三萬石借貸蘇杲賣田賑濟鄉里蘇杲眉州蘇洵之父杲輕財好施急人之病孜孜若不及凶嵗賣田以賑濟其鄰里鄉黨逮熟人將償之君辭不受以至數破其業危於飢寒然未嘗以為悔而好施益甚上官均賑恤五術元祐初河北京東淮南災傷監察御史上官均言賑恤五術一欲施豫得實二移粟就民此循環糶糴也三隨厚薄散施四選擇官吏五告諭免納夏秋二稅上嘉納王孝先不限時月糶米紹聖元年七月司農卿王孝先言置場糴米今後遇斛斗價髙須正月半已後方許出糶至麥熟罷詔今後所在置場糶米更不限時月如遇在京斛價髙户部取旨出糶黃實乞減價出糶封樁米元符元年六月河北轉運副使黃實言乞將封樁斛斗今後於新陳未接間不虧元本量減市價出糶從之張詠減價糶米張詠守蜀季春糶廩米其價比時減三之一以濟貧民凡土户為保一家犯罪一保皆坐不得糴民以此少敢犯法王文康知益州獻議者變詠之法窮民無所濟復為冦文康奏復之蜀人大喜為之謠曰蜀守之良先張後王惠我赤子俾無流亡何以報之俾壽而康張詠賑糶法宣和五年正月臣寮上言聞蜀父老謂本朝名臣治蜀非一獨張詠德政居多如賑糶米事著在皇祐中令常刻石遵守至今行且百年其法一斗止約小鐵錢三百五十文人日二升團甲給厯赴場請糶嵗計米六萬石始二月一日至七月終貧民缺食之際悉被朝廷實惠向經以圭田租賑飢民向經知河陽大旱蝗民乏食經度官廩嵗支無餘乃先以已圭田所入租賑救之已而富人皆爭效慕出粟所全活甚衆扈稱出祿米賑濟仁宗時扈稱為梓州路轉運使屬嵗飢道殣相望稱先出祿米賑民故富家大族皆願以米輸入官而全活者數萬人降敕奬諭蘇軾乞預救荒救災恤患尤當在早若災傷之民救之於未飢則用物約而所及廣不過寬減上供糶賣常平官無大失而人人受賜今嵗之事是也若救之於已飢則用物博而所及微至於耗散省倉虧損課利官為一困而已飢之民終於死亡熙寧之事是也熙寧之災傷本緣天旱米貴而沈起張靚之流不先事奏聞但立賞閉糴富民皆爭藏穀小民無所得食流殍既作然後朝廷知之始敕運江西及截本路上供米一百二十三萬石濟之沿門俵米攔街散粥終不能救飢饉既成繼之以疫疾本路死者五十餘萬人城郭蕭條田野丘墟兩稅課利皆失其舊勘會熙寧八年本路放稅米一百三十萬石酒稅虧減六十七萬餘貫略計所失共計三百餘萬石其餘耗散不可悉數至今轉運司貧乏不能舉手此無他不先事處置之過也去年浙西數郡先水後旱災傷不減熙寧二聖仁智聰明於去年十一月中首發德音截撥本路上供斛斗二十萬石賑糶又於十二月時寬減轉運司元祐四年上供斗斛三分之二為米五千餘斛賑糶盡用其錢買銀絹上供了無一毫虧損縣官而命下之日在在歡呼官既住糶米價自落又自正月開倉糶常平米仍免數路稅場所收五穀力勝錢且賜度牒三百道以助賑濟本路帖然絶無一人餓殍者此無他先事處置之力也由此觀之事豫則立不豫則廢其禍福相絶如此富弼青州賑濟行道此河北流移之民逐熟青淄五州非如本界分災傷而行賑濟也蓋豐稔而出米濟流民則其勢易荒歉而出米濟飢民則其勢難此凡為政者所當知也要識前輩處事規模不茍如此擘畫屋舍安泊流民事指揮當司訪聞青淄登濰萊五州地分甚有河北災傷流移人民逐熟過來其鄉村縣鎮人户不那趲房屋安泊多是暴露並無居止目下漸向冬寒竊慮老少人口别致飢凍死傷甚損和氣須議别行擘畫下項一州縣坊郭等人户雖有房屋人緣見是出賃與人户居住難得空間屋室今逐等合那趲房屋間數如后第一等五間第二等三間第三等兩間第四等五等一間一鄉村人户甚有空間房屋易得小可屋合逐等合那趲間數如后第一等七間第二等五間第三等三間第四等五等兩間右各請體認見今流民不少在州即請本州出榜在縣鎮鄉村即指揮縣司曉示人户依前項房屋間數各令那趲立定日限須官數足數內城郭勒廂界管當其鄉村即指揮逐地分耆壯抄點逐等姓名趲那到房屋間數申官仍叮嚀約束管當人等不得因緣騷擾乞覔人户錢物如有違犯嚴行斷決仍指揮州縣城鎮門頭人常切辨認才候見有上件災傷流民老小到門內其在州則引於司理處出頭其在鄉即引於知縣處出頭其在鎮內即引於監務處出頭各仰逐官相度人數指定那趲房屋主人姓名令幹當人盡將引押於抄點下房屋內安泊如門頭不肯引領者許流民於隨處官員處出頭速取勸決訖當使指揮安泊了當如有流民欲前去未肯安泊者亦聽從便如有流民不奔州縣直往鄉村內安泊者仰耆壯盡將引領於趲那下房內安泊訖申報本縣及當職官員躬親勸誘逐家量口數各與桑土或貸種救濟種植度日內有見在房數少者亦令收拾小可材料權與蓋造應副若有下等人户委的貧虛别無房屋那應不得一例施行除此擘畫之外如更有安泊不盡老少即指揮逐處僧尼等寺道士女冠宮觀門樓廊廡及更别趲那新居房屋安泊河北逐熟老小如有指揮不及事件亦請當職官員相度利害一面指揮施行務要流民安居不至暴露失所曉示流民許令諸般採取營運事指揮當司訪聞近者被災流民多在山林泊野打刈柴薪衣食不充已逼飢寒時棄溝壑坐見死亡之厄豈無賑恤之方又緣倉廩所收簿書有數流民不絶濟贍難周欲盡救災必須衆力庶幾凍餒稍可安存况乎今年田苗既大豐於纍載而又諸郡物價復數倍於常時蓋因流民之來遂收踊貴之直豈可只思厚己不肯救人共覩災傷諒皆痛憫兼日來纍據諸處申報以斛斗不住增長價例乞當司指揮諸州縣城郭鄉村百姓不得私下擅添物價所貴飢民易得糧食見今别路州縣城郭鄉村並皆有此指揮惟當司不曽行蓋恐止定價例則傷我土居之人須至期作擘畫可使兩無所失其上須五州鄉村人户分等第並令量出口食以濟急難施斗石之微在我則無所損聚萬千之數於彼則甚有功凡在部封共成利濟斂本路之物救鄰封之民實用通其有無豈復分於彼此令其逐家均定所出斛米數目如后第一等二石第二等一石五斗第三等一石第四等七斗第五等四斗客户三斗已上並米豆中半送納右件事須降此告諭當云各令知悉隨有其餘約束事件並從别牒處分慶厯八年十月日告諭約束事件逐一指揮如后一逐州據封去告諭米數約量縣分大小擘畫逐縣仍令逐縣亦相度耆分大小散與耆分司令遍告示鄉村等第大户一依告諭上六等糶斛碩斗出辦救濟流民務在及時措置附近州城鎮縣耆分內第一第二等人户即於逐州縣送納其第三第四第五等并客户及不近州縣鎮城逺處第一等以下應條合納斛斗人户並只於本耆送納仰縣司據逐耆人户合納都數均分與當耆內第一等人户令圓那房室盛貯如耆長係第一等即亦令均分收附仍仰耆長同共專切提舉管幹在耆都數不至散失及别致疏虞右具如前各牒青淄濰登萊五州候到將降去本使告諭若干本數收管限管日內一依上項逐件約束指揮施行仍仰指揮逐縣官員分頭專切提舉管幹斷定不得信縱交納幹當人等亂有邀難住滯人户乞覔錢物并指揮逐縣按此人户收成之際限三五日內早令送納了足專候催納了訖開坐逐縣納到石斗諸實事狀入馬遞供申當司定取日近俵散飢民不得信縱拖延誤事若是內有係大段災傷人户委的難為出辦郡不得一例施行亦不得為有此指揮别生弊情透漏有力人户如稍有違罪無輕恕所有將來俵散救濟流民次第别聽狀當司指揮臣曰此係豐熟州軍令民間出米故行移稍峻支散流民斛斗畫一指揮當司昨為河北遭水失業流民擁併過河南於京東青淄濰登萊五州豐熟處逐處散在城郭鄉村不少當司雖已諸般擘畫採取事件指揮逐州官吏多方安泊存恤救濟施行本使體量尚恐流民失所尋出給告諭文字送逐州給散諸縣令逐耆長將告諭指揮鄉村等第人户并客户依所定石斗出辦米豆數內近州縣鎮只於城郭內送納其去州縣鎮城逺處只於逐耆令耆長置厯受納於逐耆第一等人户處圓那房屋盛貯收附封鎖施行去訖日後據逐州申報已告諭到斛斗數目受納各有次第今體量得飢餓死損須至令上項五州一例於正月一日委官分頭支散上件勘諭到斛斗救濟飢民者一請本州才候牒到立便酌量逐縣耆分多少差官每一官令專管十耆或五七耆據耆分合用員數除逐縣正官外請於見任并前資寄居及文學助教長史等官員內須是揀擇有行止清亷幹當得事不作過犯官員仍勘會所差官員本貫將縣分交互差委支散免致所居縣分親故顔情不肯盡公及將封去帖牒書填定官員職位姓名所管耆分去處給與逐官收執火急發遣往差定縣分計會縣司盡時將在縣收到城罰錢或頭子錢并檢取逺年不用放紙賣錢收買小紙依封去式樣字號空敬雕遍印板酌量流民多少寬剩出給印押厯子頭各於厯子後粘連空紙三兩張便令差定官員令本縣約度逐耆流民家數分擘厯子與所差官員使令親自收執分頭下鄉勒耆壯引領排門點檢抄劄流民每見流民逐家盡底喚出本家骨肉親自當面審問的實人口填定姓名口數逐家便各給厯子一道收執照證準備請領米豆即不曽差委公人耆壯抄劄别致作弊虛偽重疊請却厯子一指揮差委官抄劄給厯子時仔細點檢逐處流民如內有雖是流民見今已與人家作客鋤田養種及有錢本機織販舂諸般買賣圖運過日不致失所人更不得一例抄劄姓名給與厯子請領米豆一應保流民雖有房舍權時居住只是旋打州柴草日逐旋求口食人等並盡底抄劄給與厯子令請領米豆一應有流民老小羸瘦全然單寒及孤獨之人只是尋村乞丐安泊居止不定等人委所差官員擘畫歸著耆分或在廟寺院安泊亦使出給厯子請領米豆又不得謂難為拘管輒敢違棄却致拋擲死損請提舉官常切覺察一應係土居貧窮年老殘患孤獨見求乞貧子等仰抄劄流民官員躬親檢點如果不是虛偽亦各給厯子令依此請領米豆一指揮差委官員須是於十二月二十五日已前抄劄集定流民家口數給散厯子了當須管自皇祐元年正月一日起首一齊支給不得拖延有誤至日支散亦不得日數前後不齊一流民所支米豆十五嵗以上每人日支一升十五嵗以下每人日給五合五嵗以下男女不在支給仍厯子頭上分别細算定一家口數合請米豆都數逐旋依都數支給所貴更不臨時旋討者一緣已就門抄劄見流民逐家口數及嵗數則支散日更不令全家到來只每家一名親執厯子請領一逐官如管十耆即每日支兩耆逐耆併支五日口食候五日支遍十耆即却從頭支散所貴逐耆每日有官員躬親支散如管五七耆者即將耆分大者每日支散一耆其耆分小者每日支散兩耆亦須每日一次支遍逐次併支五日口食仍預先於村莊明出曉示及令本耆壯丁四散告報流民指定支散日分去處分明開説甚字號耆分仍仰差去官員須是及早親自先到關支斛斗去處等候流民到來逐旋支散才候支絶一耆速往下次合支耆分不得自作違慢拖延過時别至流民歸家遲晚道塗凍露一指揮差委官員相度逐處受納下米豆如內有在耆分遙逺第一等户人家收附恐流民所去請領遙逺即勒耆壯量事圖那車乘般赴本耆地分中心穩便人家房室內收附就彼便行支散貴要一耆之內流民盡得就近請領一指揮所差官員除抄劄籍定給散流民外如有逐旋新到流民並須官員親到審問仔細點檢本家的實口數安泊去處如委不是重疊虛偽立便給與厯子據所到日分起請如有已得厯子流民起移仰居停主人畫時令流民將元給厯子於監散官員處毁抹若是不來申報及稱帶却厯子並仰量行科決不得鹵莽重疊給印厯子亦不得阻滯流民一逐耆各均勻納下斛斗竊恐流民於逐耆分安泊不均仰縣司勘會據流民多處耆分酌量人數發遣趲併於少處耆分安泊令逐耆均勻支散救濟若是流民安泊處穩便不願起移即趲併别耆斛斗就便支俵不得抑勒流民須令起移一州縣鎮城郭內流民只差委本處見任官員亦先且躬親排門抄劄逐户家口數依此給與厯子每一度併支五日米豆候食盡挨排日分接續支給米豆一般施行一逐州除逐處監散官員仍請與通判或選差清幹職官一員往本州界內往來都大提舉諸縣支散米豆官吏仍點檢逐耆元納并逐官支散文歷一依逐件鈐束指揮施行仍親到所支散米豆處子細體問流民所請米豆委得均濟别無漏落如有官員弛慢不切用心信縱手下公人作弊減尅流民合請米豆不得均濟即密具事由申報本州别選差官員衝替訖申當司不得蓋庇一所支斛斗如州縣內支絶已納到告諭斛斗外有未催到數目便且於省食斛斗內權時借支據見欠斛斗立便催納依數撥填其鄉村所納斛斗如未足處亦逐旋請緊切催促不得闕絶支散閃誤流民一每官一員在縣摘差手分斗子各一名隨行幹官仍給升斗各一隻差本縣公人三兩人當直如在縣公人數少即權差壯丁亦不得過三人一所差官員除見任官外應係權差請官如手下幹當人并耆壯等及流民內有作過者本官不得一面區分具事由押送本縣勘斷施行一權差官每月於前項贓罰頭子等錢內支給食直錢五貫文見任官不得一例支給一權差官已有當司封去帖牒若差見任官員即請本州出給文字幹當其賞罰一依當司封去權差官帖牒內事理施行一才候起支當司必然别州差官遍詣逐州逐縣逐耆點檢如有一事一件違慢本州承牒手分并縣司官吏必然勘罪嚴斷的不虛行指揮一逐州縣鎮候差定官員將印行指揮畫一抄劄一本付逐官收執照會施行一勘會二麥將熟諸處流民盡欲歸鄉尋指揮逐州并監散官員將見今籍定流民據每人合請米豆數目自五月初一日算至五月終一併支與流民充路糧令各任便歸鄉一指揮出榜青淄等州河口曉示與免流民稅渡錢仍不得邀難住滯一指揮青淄等州曉示道店不得要流民房宿錢事右具如前事頒各牒青淄濰萊登五州候到各請遵依前項逐件指揮施行就報所有當司封去帖牒如有剩數却請封送當司不得有違宣問救濟流民事劄子臣伏奉聖旨取索擘畫救濟流民事件令節略編纂作四策具狀繳奏去訖臣部下九州軍其間近河五州頗熟逐醵於民得粟十五萬斛第二等兩石第五等三斗而已民甚樂輸只令人户就本村耆隨處收納貴不勞我土民多差官員領之見任不足即指請前資寄任待闕間官又先時已於州縣城鎮鄉村抄下舍宇十餘萬間流民來者隨其意散處民舍中逐家給一厯厯各有號使不相侵欺仍於厯前計定逐家口數及合給物數令官員詣逐鄉逐耆就流人所居近處每人日給生豆米各半升流民至者安居而日享食物又以其散在村野薪水之利甚不難致似此直養活至去年五月終麥熟仍各給與一去路糧而遣歸而按籍總三十餘萬人此是於必死之中救得活者也與夫只於城中煮粥使四逺飢羸老弱每日奔走屯聚城下終日等候或得或不得閃誤死者大不侔也其餘未至羸病老弱稍營運自給者不預此籍然亦遍曉示五州人民應是山林河泊有利可取者其地主不得占却一任流民採掇如此救活者甚多即不見數目山林河泊地主寧無所損然損者無大害而流民獲利者便活性命其利害較然也又減利物廣招兵徒一萬人尋常利物每一人可招三人或四五口及四五萬人大約通計不下四五十萬人傳云生全百萬者妄也謹具劄子奏聞程迥代能仁院賑濟疏伏以釋迦如來以無礙神通放大光明照見一切衆生受諸苦惱乃發大慈悲願力救度無量衆生凡有飢渴皆得飽滿我釋氏子躬受佛教成就志願亦復如是恭惟知縣某公知丞某公仙尉某公皆宿植善根與我士民有大因緣故受天子命來為民主宰今嵗在庚子水旱飢饉委鄉官抄劄鰥寡孤獨跛眇廢疾不能自存之人計一千五百九十九人雖屢申上司乞發下義倉米賑濟然使府所臨一郡八縣監司所統一路百城雖許量撥至今未下度其米斛不足霑濟今用米一升可活一人一日之命積之百五十日則麥熟可自活是用米石五官斗可活一人之命今我大檀越諸公能傾囷倒廩救活一人二人三人以至十人百人之命獲福無量皆與佛等下至貧庶之家老節衣食以救飢困以至童男女能輟餅果之資以為布施一錢已上皆獲善果今敬對三寶前焚香禮拜發此大願天地鬼神實臨之凡我施主官員則願加秩進祿三錫九遷儒士則聰明穎開早掇科第民庶公吏則家道昌盛子孫榮顯所求稱意逢遇吉慶至於僧道童行皆於道法早得超度晉童子聚沙以戲見佛施佛佛為受記為轉輪如來四之一其後百年阿育王是也是以布施受福若影隨形如響應聲不可誣也伏願仁慈見聞喜捨俟圓滿日具名宣懴是時勸分賑糶無所不至復用此策令僧道勸諭之可見其不敢科亦明矣曽鞏救災議河北地震水災隳城郭壞廬舍百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患於暴露非錢不可以立屋患於乏食非粟不可以飽二者不易之理然非得此二者雖主上憂勞於上使者旁午於下無以救其患塞其求也有司建言請發倉廩與之粟壯者人日二升幼者人日一升主上不旋日而許之賜之可謂大矣然有司之言特常行之法非審計終始見於衆人之所未見也今河北地震水災所毁敗者甚衆可謂非常之變也遭非常之變者亦有非常之恩然後可以振之今百姓暴露乏食已廢其業矣使之相率日待二升之廩於上則其勢必不暇乎他為是農不復得修其畎畝商不復得治其貨賄工不復得利其器用間民不復得轉移執事一切棄百事而專意於待升合之食以偷為性命之計是直以餓殍養之而已非深思逺慮為百姓長計也以中户計之户為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一户月當受粟五石難可以久行也不行則百姓何以贍其後久行之則被水之地既無秋成之望非至來嵗麥熟賑之未可以罷自今至於麥熟凡十月一户當受粟五十石今被災者十餘州州以二十萬户計之中户以上及非災害所被不仰食縣官者去其半則仰食縣官者為十萬户食之不遍則為施不均而民有無告者也食之遍則當用粟五百萬石而足何以辦此又非深思逺慮為公家長計也至於給授之際有淹速有均否有真偽有會集之擾有辨察之煩措置一差皆足致弊又羣而處之氣久蒸薄必生疾癘此皆必至之害也且此不過能使之得旦暮之食耳其於屋廬修築之費將安取哉屋廬修築之費既無所取而就食於州縣必相率而去其故居雖有頽牆壞屋之尚可全者故材舊瓦之尚可因者什器衆物之尚可賴者必棄之而不暇顧甚則殺牛馬而去之者有之伐桑棗而去之者有之其害又可謂甚也今秋氣已半霜露方始而民露處不知所蔽蓋流亡者亦已衆矣如不可止則將空近塞之地空近塞之地失戰鬭之民此衆士大夫之所慮而不可謂無患者也空近塞之地失耕桑之民此衆士大夫之所未慮而患之尤甚者也何則失戰鬭之民異時有警邊戍不可以不增爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出於無聊之計有窺倉庫盜一囊之粟一束之帛者彼知己負有司之禁則必鳥駭鼠竄竊弄鋤挺於草茅之中以扞遊徼之吏強者既囂而動則弱者必隨而聚矣不幸或連一二城之地有桴鼓之警國家胡能晏然而已乎况夫外有邊陲之可慮內有郊祀之將行安得不防之於未然而銷之於未萌也然則為今之策下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事定矣何則今被災之州為十萬户如一户得粟十石得錢五千下户常産之資平日未有及此者也彼得錢以全其居得粟以給其食則農得修其畎畝商得治其貨賄工得利其器用間民得轉移執事一切得復其業而不失夫常生之計與專意以待二升之廩於上而勢不暇乎他為豈不逺哉此可謂深思逺慮為百姓長計者也由有司之説則用十月之費為粟五百萬石由今之説則用兩月之費為粟一百萬石况貸之於今而收之於後足以賑其艱乏而終無損於儲蓄之實則所實費者錢五巨萬貫而已此可謂深思逺慮為公家長計者也又無給授之弊疾癘之憂民不必去其故居茍有頽牆壞屋之尚可全者故材舊瓦之尚可因者什器衆物之尚可賴者皆得而不失况於全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安居足食則有樂生自重之心各復其業則勢不暇乎他為雖驅之不去誘之不為盜矣夫飢嵗聚餓殍之民而與升合之食無益於救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民因詔令之出必皆喜上之足賴而自安於畎畝之中負錢與粟而歸與其父母妻子脫於流轉死亡之禍則戴上之施而懷欲報之心豈有已哉天下之民聞國家措置如此恩澤之厚其誰不震動感激悅主上之義於無窮乎如是而人和不可致天意不可悅者未之有也人和洽於下天意悅於上然後玉輅徐動就陽而郊荒裔殊陬奉幣來享疆內安輯里無囂聲豈不遏變於可為之時消患於無形之內乎此所謂審計終始見於衆人之所未見也不早出此或至於一有枹鼓之警則雖欲為之將不及矣或謂方今錢粟恐不足以辦此夫王者之富藏之於民有餘則取不足則與此理之不易者也故曰百姓足君孰與不足百姓不足君孰與足蓋百姓富實而國獨貧與百姓飢殍而上獨能保其富者自古及今未之有也故又曰不患貧而患不安此古今之至戒者也是故古者二十七年耕有九年之蓄足以備水旱之災然後謂之王政之成堯水湯旱而民無捐瘠者以是故也今國家倉庫之積固不獨為公家之費而已凡以為民也雖倉無餘粟庫無餘財至於救災補敗尚不可已况今倉庫之積尚可以用獨安可以過憂將來之不足而立視夫民之死乎古人有言曰剪爪宜及膚割髮宜及體先王之於救災髮膚尚無足愛况外物乎且今河北軍州凡三十七災害所被十餘州軍而已他州之田秋稼足望今有司於糴米常價斗增一二十錢非獨足以利農其餘增糴一百萬石易矣斗增一二十錢吾權一時之事有以為之耳以實錢給其常價以茶荈香藥之類佐其虛估不過捐茶荈香藥之類為錢數萬貫其費已足茶荈香藥之類與百姓之命孰為可惜不待議而可知也夫費錢五巨萬貫又捐茶荈香藥之類為錢數巨萬貫而足以救一時之患為天下之計利害輕重又非難明也願吾之有司能越拘攣之見破常行之法與否而已此時事之急也故述斯議焉趙抃救災記熙寧八年吳越大旱抃以資政殿大學士知越州前民之未飢為書問屬縣災所被者有幾鄉民能自食者有幾當廩於官者幾人溝防興築可僦民使治之者幾所庫錢倉粟可發者幾何富人可募出粟者幾家僧道士食之羡粟書於籍其幾具存使各書以對而謹其備州縣吏録民之孤老疾弱不能自食者二萬一千九百餘人以告故事嵗廪窮人當給粟三十石而止抃檢富人所輸及僧道士食之羡者得粟四萬八千餘石佐其費使自十月朔日人受粟日一升幼小者半之憂其衆相蹂也使受粟者男女異日而人受二日之食憂其且流亡也於城市郊野為給粟之所五十有七使各以便受之而告以去其家者勿給計官為不足用也取吏之不在職而寓於境者給其食而任以事告富人無得閉糴又為之出官粟得五萬二千餘石平其價豫民為糶粟之所凡十有八使糴者自便如受粟又僦民修城四千一百丈為工三萬五千下户乏食者賑糶有田無力耕者與賑貸闔境五邑以鄉村逺近均粟置場每場以一總首主出納十場以一官吏專伺察越人至今稱之馮楫勸諭賑濟詩紹興辛未嵗歉米貴瀘帥馮楫出俸錢買米減價糶賣賑濟救民賦詩示幹事人我昔未第日鄉間逢嵗飢兩率閭里人相共行賑濟飢民僅得食免困餓而斃及我登第後被罪歸田里尋復拜召命迤邐治行計忽見道途間小兒有遺棄復自勸鄉邦割已用施惠日飯八千人八旬乃休止于時已麥熟糧食相接濟我始趨行朝蒙恩長宗寺初本不望報人以為能事制司具切奏還官不容避今年又少歉我適帥瀘水無户備飯食所濟俱用米聊舍三百斛十中活一二又以一千石減價平行市每石減十錢庶幾無湧貴更有不熟處資簡潼川類計用減價糶所祈均獲濟我非財有餘但愍民不易一時所施行樂為之識記洪浩救荒法宣和六年浩為秀州録事秋大水田不沒者十一流民塞路倉庫空虛無賑救策公白於郡守以荒政自任悉籍境內粟留一年食發其餘糶於城之四隅不能自食官為主之立屋於西南兩廢寺十人一室男女異處防其殽偽涅黑子識其手東五之南三之負㸑樵汲有職民羸不可杖有侵牟鬭囂者亂其手文逐之借用所掌發運名錢且盡會浙東綱常平米斛四萬過城下公遣吏鎖津柵諭守便截留守禁不肯曰此御筆所起也罪死不赦浩曰民仰哺當至麥熟今臘猶未盡中道而止則如勿救寧以一身易十萬人命訖留之居無何亷訪使者王孝竭至郡曰平江哀號訴飢者旁午此獨無何也守具以對郡延公如兩寺驗視孝竭曰吾嘗行邊軍法不過是也違制抵罪為君脫之又請得二萬石所活九萬五千餘人後諸卒以城畔虜掠無一家免過門曰此洪佛子家也汝毋得入趙令良賑濟法趙令良隆興二年帥紹興是時流民聚城郭待賑濟餓而死者不可勝計通判王恬閻立寧孫建策云今盡常平義倉之米賑給之至來年麥熟止恐無以為繼况旬給斗升之米官不勝其勞民不勝其病莫若計其地里之逺近日數之多寡人給兩月之糧令歸治本業不猶愈於聚於城郭待斗升之給困餓而死乎趙行其言委官抄劄給糧以遣之不旬日間城中無一死人歡呼盈道全活者甚衆此用曽南豐之美意徐寧孫建賑濟三策一賑濟飢民今請自本州縣當職官多方措置從實抄劄實係孤老殘疾并貧乏不能自存闕食飢民大人小兒數目籍定姓名將義倉斛斗各逐坊巷逐村逐鎮分散賑濟不必聚落逐處勸請鄉官或士人各三人鄉村無上户士人處請稅户主管置立收支給散關子每五日一次併給內大人日支一升小兒減半州縣鎮市鄉村並令同日以巳時支散用革重疊冒請之弊仍將本州縣見養濟乞丐人亦同日别作一處支米不得衮合飢民賑給臣謂其説固是但不言義倉之米如何得到村鎮一糶賣米斛本謂接濟艱食之民今訪聞州縣却是在市牙儈與有力強猾之徒借倩人力假為繿縷之服與賣所合干人通同攙奪不及鄉村無食之民今仰本州立賞錢一百貫約束密切委官譏察不得容牙子停貯販有力強猾公吏軍兵之家假作貧民請買務要實及鄉村民無致冒濫如有違犯之人斷罪追償一賑濟當支散日用五色旗分為五處每處分差指使二員吏人二名抄劄飢民每一名給與牌子并小色旗候支俵及數前來賑濟所報覆一處先了先令赴請所貴分頭集事又且飢民不致併就一處喧閙趙雄乞樁積錢給散契勘前件諸州多是不通水路若從外臺乞米搬運實非良策欲望聖慈特降睿旨於總所朝廷積錢內支降錢引二十萬道撥赴帥司計臣同本路漕臣視諸州旱傷人户數隨宜給散令守臣多力措置於得熟去處趁時收糴米不足則糴菽粟麥蕎之類茍可以救死亦何所擇目今若不預為之備更俟十月刈穫見得十分飢荒方行奏請則緩不及事矣蘇次參賑濟法蘇次參澧州賑濟患抄劄不公給印厯一本用紙半幅上書某家口數若干大人若干小兒若干合請米若干實貼於各人門首壁上內聲迹如有虛偽許人告首甘伏斷罪以備委官檢點又患請米冗併今幾人為一隊逐隊用旗引卯時一刻引第一隊二刻第二隊以至辰巳皆用前法則自無冗雜且老幼疾病婦女皆得均糴又任澧陽司户日權安鄉縣正值大潦始至令典押將縣圖逐鄉抹出全潦者用緑半潦者用青無水之鄉用黃不以示人又令鄉司抹麥參合方請鄉耆逐鄉為圖復以青緑黃色别其村分出圖參驗故不檢潦而可知分數催科賑濟亦視此為先後其法甚簡要也救荒報應張詠鎮蜀時夢謁紫府真君接語未久吏忽報請到西門黃兼濟黃幅巾道服真君降階迎接甚謹且揖詠坐黃之下詢顧詳欵似有欽嘆之意詠翊日命吏請黃戒令常服來比至一如夢中所見遂以夢告因問黃有何隂德蒙真君禮遇如此黃曰無他長惟每嵗禾麥熟時以三萬緡收糴民或艱食即以元糴斛斗不增價糶之在兼濟初無損於小民頗有補詠曰此君所以居詠上也命二吏掖持黃令坐索公裳拜之三四世之富民逸居飽暖無所用心不為嗜欲所惑則必為慳慢貪嫉強橫姦詐所惱矣黃能如此宜為真君所重饒州富民段二十八紹興丁卯嵗大飢流民滿道段積穀數倉閉不肯糶一日方與家人評論物斛低昻間忽天雨晦冥火光滿屋段遂為震雷所擊家人發倉求救其所貯穀亦為天火所燒盡矣蓋飢者嵗之不幸雖冥數如此而上帝豈不念之安有不能賑濟而又利其價之踴貴耶宜其自取誅戮也慶厯八年大水嵗飢流民滿道韓琦大發倉廩并募人入粟分命官吏設粥食之日往按視逺近歸之不可勝數明年皆給路糧遣各還業所活甚多明詔嘉奬琦薨後數年侍禁孫勉以殺黿為泰山所追至一公府見廳上金紫而坐者乃韓琦勉以老幼無託告之琦已惻然密諭勉云今到彼若告不下即報乞檢房簿勉出又至一公府守衛者愈嚴惡見廳上有三金紫者坐在案頭黿亦在側勉大怖屢告不允遂報乞檢房簿金紫者怒曰汝安知有房簿耶誰泄此事命加凌窘勉不禁其苦遂以實告三金紫者皆首肯嗟嘆曰韓侍中在陽間常存心救濟天下往年水災所活七百萬人今在此尚欲活人吾儕所不及也即命檢房簿少頃數鬼􅐝一大木匣至三吏由廳而下檢簿上呈西向坐者讀畢諭黿云孫勉已伏償命然尚餘一十五年壽至期當令受罪黿滅勉亦得還昨州府嵗飢大疫郡守憐之勸諭士民出粟拯濟委官專領其事此官煩於應對且不欲飢民在市悉載過江置諸壩中但日以一粥飯食之而已然日出雨至皆無所避無何水暴至飢民盡被漂溺不數日此官亦病疫死回視韓琦相去逺甚一入冥路事知如何漢州長者李發遇嵗不登輒為食以食餓者自春徂冬日以千數乾道戊子民飢甚官為發廩勸分而就食李家者日至三四萬人明年流逋未復而荒政已罷民愈困敝數百里間扶老携幼挈釡采薪而以李為歸者其衆又倍於前蓋李之為此自紹興之丙辰至此三十餘年嵗以為常所出捐不知其若干斗所全活不知其幾何人矣及是而惠益廣績愈茂故州郡及諸使者始上其事孝宗皇帝嘉之授初品官其後孫寅仲登第唱名第三世皆以為賑濟之報救荒活民書卷下
