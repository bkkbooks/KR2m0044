body:
  text: 救荒活民書卷中宋董煟撰救荒之法不一而大致有五常平以賑糶義倉以賑濟不足則勸分於有力之家又遏糴有禁抑價有禁能行五者則亦庶乎其可矣至於檢旱也減租也貸種也遣使也弛禁也鬻爵也度僧也優農也治盜也捕蝗也和糴也存恤流民勸種二麥通融有無借貸内庫之類又在隨宜而施行焉常平煟曰常平之法專為凶荒賑糶穀賤則増價而糴使不害農穀貴則減價而糶使不病民謂之常平者此也比年州縣窘匱往往率多移用差官覈實亦不過文具而已自乾道間給降㑹子一百萬道兊起諸路常平錢一百萬貫而郡縣遂多侵用義倉後雖許用㑹子措置和糴其間未免抑配當時甚患之然則平糴之法遂不可行乎曰不然臣前於李悝後於和糴篇論之詳矣但官司糴時不可籍數定價須視歳上中下熟一依民間實直寧毎升髙於時價一二文以誘其來何患人之不競售哉葢官司措置惟欲救民之病財用非所較若以私家理財規式處之則失所以為常平之意矣一常平法本無嵗不糴無嵗不糶上熟糴三而舍一中熟糴二下熟糴一此無歲不糴也小饑則𤼵小熟之歛中饑則𤼵中熟之歛大饑則𤼵大熟之歛此無嵗不糶也近來熟無所糴饑無所糶其間有司之吝閉為埃塵良可嘆息一常平錢物不許移用不知他費不許移用至於救荒正所當用若必待報則事無及矣今遇旱傷去處州縣仰一面計度用常平錢於豐熟處循環収糴以濟饑民俟結局日以糴本撥還常平可也一常平賑糶其弊在於不能遍及鄉村今委隅官里正監視類多文具無實惠及民宜倣富弼青州監散米豆之法變通而行之但水脚之費般運之折無所從出故縣不敢請於州村不敢請於縣不知饑荒之年人患無米不患無錢毎升増於官中所定之價一文以充上件廩費則自無折閱之慮矣何患賑糶之米不能遍及村落哉但當逐保給歴零賣以防近上户人頻買興販之弊一紹興庚午髙宗皇帝謂執政曰國家常平以待水旱宜令有司以陳易新不得侵用若臨時貸於積穀之家徒為文具無實效也一昔蘇軾奏臣在浙中二年親行荒政只用出糶常平米一事更不施行餘䇿若欲抄劄貧民不惟所費浩大有出無収而此聲一布貧民雲集盜賊疾疫客主俱斃惟有依此條將常平斛㪷出糶即官司簡便不勞抄劄勘㑹給納煩費但得數萬石斛㪷在市自無壓下物價境内百姓人人受賜古今之法莫良於此臣謂蘇軾之法止及於城市若使縣鎮通行方為良法也况賑濟自有義倉並行不悖此又為政者所當知一或謂減價出糶官廩以壓物價固善矣然饑荒之年常平無米則如之何臣曰不然元祐元年四月左司諌王巖叟言訪聞淮南旱甚物價湧貴本路監司殊不留意詔發運司截留上供米一十萬石比市價量減出糶與闗米人户毎户不得過三石其糶到錢起𤼵上京又何患於無米即此例前賢行之甚多兹不再舉義倉煟曰義倉民間儲蓄以備水旱者也一遇凶歉直當給以還民豈可吝而不𤼵𤼵而遽有徳色哉謹按隋開皇五年長孫平建言諸州立社倉於當社委社司執帳檢校毎年収積遇嵗不熟則均給之唐貞觀初尚書左丞戴胄上言隋開皇置天下社倉終文皇得無饑太宗曰為百姓先作儲貯以備凶年亦非横歛宜下有司具為令王公以下墾田畞税六升天寳八年天下義倉無慮六千三百七十萬餘石長慶大中以來約束旣嚴貯貸不絶至於五代因之以饑饉加之以戰伐而義倉不得不廢矣慶歴間王其上言以為舊事乆廢當酌輕法以行之如唐田畝之稅其費太重永徽中别頒新格自上户以降出粟又且不均方今之宜莫若第五等以上於夏秋正税之外毎二㪷納一升隨常賦以入各於州邑擇其便地别置倉以儲之領於本路轉運司今天下大率取一中郡計之夏秋正税粟麥之屬且以十萬石為率則義倉米一中郡嵗得五千石矣若大官斗収一升則又倍之矧天下所入之廣乎使仍嵗豐熟捐有餘補不足實天下之利上於是詔天下立義倉然今之州縣因仍既乆忘其所以為斯民所寄之物矣一義倉合於民間散貯逺都擇人掌之如社倉之法今輸於州縣非也葢憔悴之民多在鄉村於城郭頗少諸儲州軍多時義倉米隨冬苖輸納州倉一有饑饉人民難以委棄廬舍逺赴州郡請求今欲毎遇凶歉之年相度諸縣饑之大小撥還義倉米斛其水脚之需亦於米内量地里逺近消尅縣之於鄉亦然如此則山谷之民皆䝉其惠不猶愈於閉為埃塵耗於雀鼠仍使斯民饑餓而死乎一檢准令文州縣鎮寨嵗於十月初差官抄檢内外老疾貧乏不能自存之人十一月起支後到者聽支每人日支一升七嵗以下減半每五日一次併支至次年正月終止遇閏及本土収成早晚者官司相度給散時月日通給百五十日止今江浙水田種麥不廣冬間民未困乏其困乏多在青黄未接之時此為政者所宜究也一熈寧初陳留知縣蘇消言臣領幾邑請為文下倡户五等自二石四㪷出粟有差毎社有倉各置守者耆為輸納官為籍記嵗凶則出以賑民藏之乆則又為立法使新陳相登即詔行之旣而王安石沮之遂不果行石介著書亦謂隋唐義倉最便若每村立一倉委有年徳者主之遇饑饉量口以給則民不乏矣此法向來福建亦行之若乃民間再自出米不若即義倉行之之為善一紹聖著令諸縣義倉米㪷収五合即元豐舊法也大觀初乃令増㪷収一升以備賑荒至今行之然義倉米不留諸鄉而入縣倉悉為官吏移用始也縣倉於民猶近取後上三等户皆令輸郡則義米帶入郡倉轉充軍食或資頒費豈復還民故遇凶年無以救民之死今若以常歳所取義米令諸鄉各建倉貯之縣籍其數主以有年徳之輩遇饑饉還以賑民且不勞逺致推行諸鄉即民被實惠豈不勝於科抑賑糶之策乎一慶元六年六月臣寮劄子言常平義倉國家專恃以待賑救據諸路提舉司申户部數目常平錢七十餘萬緡義倉錢五十餘萬緡二司之米各幾二百萬石縁提舉主管略不經意徒存虚名二司遂為虛設臣謂常平有糴本固當有錢義倉五十餘萬緡則誠非令典也攘民所寄之物而私用糶錢廷臣方且昌言而不怪習俗之移人如此一賑濟之弊如麻抄劄之時里正乞覔強梁者得之善弱者不得也附近者得之逺僻者不得也胥吏里正之所厚者得之鰥寡孤獨疾病無告者未必得也賑或已是深冬官司疑之又令覆實使饑民自備餱粮數赴㸃集空手而歸困踏於風霜凛冽之時甚非古人視民如傷之意今縣令宜毎鄉委請一土户平時信義為鄉里推服官員一名為提督賑濟官令其逐都擇一二有聲譽行止公幹之人為監視每月送朱墨㸃心錢縣道委令監里正分團抄劄不許邀阻乞覔如有乞覔可徑於提督官投状申縣斷治如更抑遏可自於本縣或佐官㕔陳訴當痛懲一二以勵其餘其𤼵米賑糶亦如之若此則庶乎少革耳一賑濟所以救饑民者多以支米為便不知支米最為重費弊倖又多不係沿流及産米去處般運極為費力往往夫脚與米價相等更有在路減竊拌和之弊若是大荒年分穀米絶無民間艱食不容不措置移運米斛若不是十分荒歉米斛流通物價不湧不如支錢最省便更無偽濫之弊小民將錢可以抽贖典過斛斗或是一㪷米錢可買二㪷雜斛以三二升拌和菜茄煮以為食則是二㪷之糶斛可供一家五七口數日之費然恐官於支錢所委不得其人亦有減尅之弊不若錢米兼支實為兩利勸分煟曰民户有米得價糶錢何待官司之勸只縁官司以户等髙下一例科配且不測到場檢㸃故人户憂恐藉以為名閉糴深藏以備不測其往還道路與無厯頭之人反無告糴之所推原其弊皆縁吏無策但欲認米之足數假勸分之美名欺罔上司以圖觀美不知適以病民也臣居村落日觀其弊謂上户固所當勸自餘中下之家不必勸所謂上户者田畝之跨連阡陌蓄積之紅腐相因然今之鄉落所謂上户者亦不多矣中下之户凶荒之餘所入未能供所出安能有餘以賑糶哉人之常情勸之出米則愈不出惟以不勸勸之則其米自出臣謂今莫若勸誘上户及富商巨賈俾之出錢官差牙吏於豐熟去處販米豆各歸鄉里以濟小民結局日以本錢還之村落無巨賈處許十餘家率錢共販或鄉人不願以錢輸官而願自糶販者聽官不抑價利之所在自然樂趨富室亦恐後時争先𤼵廩則米不期而自出矣此勸分之要術更宜斟酌而行之若山路不通舟楫處又有抄劄賑給就食散錢之法初非執一一呉遵路知通州時淮甸災傷民多流轉惟遵路勸誘富豪之家得錢萬貫遣牙吏二十六次和賃海船往蘇秀収糴米豆歸本處依元價出糶使通州災傷之地常與蘇秀米價不殊當時范仲淹乞宣付史館誠以饑荒之年人旣闕米官復以認米責之則其勢頗逆惟俾之出錢各自運來其策為最一天下有有田而富之民有無田而富之民有田而富者每嵗輸官固藉苗利一遇饑饉自能出其餘以濟佃客至於無田而富者平時射利浸漁百姓緩急之際可不出力斡旋以救饑民為異時根本之地哉漢家重困商賈盖為此耳今饑饉之年勸誘此曹使出錢糶販初非重困又况救荒乃暫時之役彼亦安得而辭一淳熈間臣寮上言州縣荒政所謂勸分者葢以豪家富室儲積旣多因而勸之賑𤼵以惠窮民以濟鄉里此亦所當然臣訪聞去歲州縣勸諭賑糶乃有不問有無只以戸等髙下科定數目俾之出備賑糶於是吏乗為姦多少任情至有人户名係上等家實貧窘至鬻田糴米以應期限而豪民得以計免者其餘乗日中之急濟其姦利縁此多受其害臣竊見朝廷重立賞格勸諭賑糶已是詳備所有用等則科糶理宜禁止臣愚欲望睿㫖下諸路漕臣嚴戒所部如有依前用等則科糶即許按劾仍許人户越訴重作施行尋得㫖止行勸諭毋得科抑則聖意誠知科抑之弊擾民矣一凶年糶粟以活百姓可謂惠而不費况所及者皆鄉曲鄰里可以結恩惠可以積隂徳可以感召和氣而馴致豐稔可以使盜賊不作而長保富贍其於大姓亦有補矣倘使小民轉死溝壑流移他所大姓占田何暇自耕土地荒蕪必有所損况又有甚於此者乎止縁間有小民謂官司抑配我所當得不知感謝却使大姓有怠於勸分之意此為縣令者所宜知而以此意曉諭可也禁遏糴煟曰嘉祐四年諫官呉及言春秋之時諸侯相傾竊地專封固不以天下生靈為憂然同盟之國有救患分災之義秦饑晉閉之糴而春秋誅之聖朝恩施動植視民如傷然州郡之間官司各專其民擅造閉糴之令一路饑則鄰路為之閉糴一郡饑則鄰郡為之閉糴夫闕以上所宜同國休戚而宣布主恩坐視流離又甚於春秋之時豈聖朝所以子育兆民之意者故丁丑詔諸路轉運司凡鄰郡灾傷而輒閉糴者以違制坐之一或者謂遏糴固非美名然聴他處之人恣行般運不加禁止本州本縣自至艱糴臣曰此見識狹陋之論也天下一家饑荒亦有路分今鄰郡以吾境内豐稔而來告糴義所當恤此宜物色上流豐熟去處勸誘大姓或本州𤼵錢差人轉糴循環糶販非惟可活吾境内之民又且可活鄰郡鄰路之饑民尚何艱糴之有脱使此間之米不許出吾界他處之米亦不許入吾界一有饑饉環視壁立無告糴之所則饑民必起而作亂以延旦夕之命此禍亂之尤速者也淳熈八年八月勅今嵗間有旱傷州縣全藉鄰境或旁近豐熟去處通放客販米斛已降指揮不得遏糴訪聞上流得熟州郡尚不能體認朝廷均一愛民之意輒將客販米斛邀阻禁遏聖㫖劄付諸路帥漕司各檢坐條法遍行所部州軍恪意奉行如敢違戾仰逐司覺察按劾尚或容蔽委御史臺彈奏小民聞官司有榜禁遏每遇外人糴米則數十為羣脅持取錢毆人傷損村民亦不敢擔米入市民間遂致闕食其令下詐起類如此一檢㑹編勅諸興販斛㪷雖遇災傷官司不得禁止又條法興販斛㪷及以柴炭草木博糴糧食者並免納脚力稅錢注云舊收稅處依舊即災傷地分雖有舊例亦免觀此則知條􅃯不許遏糴明矣不抑價煟曰常平令文諸糶糴不得抑勒謂之不得抑勒則米價隨時低昻官司不得禁抑可知也比年為政者不明立法之意謂民間無錢須當籍定其價不知官抑其價則客米不來若他處騰湧而此間之價獨低則誰肯興販興販不至則境内乏食上户之民有蓄積者愈不敢出矣饑民手持其錢終日皇皇無告糴之所其不肯甘心就死者必起而為亂人情易於扇搖此莫大之患何者饑荒之年人雖賣妻鬻産以延旦夕之命亦所不顧若客販不來上户閉糴有饑死而已耳有刼掠而已耳可不思所以救之哉惟不抑價非惟舟車輻凑而上户亦恐後時争先𤼵廩而米價亦自低矣一昔范仲淹知杭州二浙阻饑穀價方湧㪷計百二十文仲淹増至百八十衆不知所為仍多出榜文具述杭饑及米價所増之數於是商賈聞之晨夕争先惟恐後且虞後者繼來米旣輻凑價亦隨減包拯知廬州亦不限米價而賈至益多不日米賤此皆前賢已行之明驗一臣在村落嘗見蓄積之家不肯糶米與土居百姓而外縣牙人在鄉村収糴其數頗多旣是鄰邑救荒官司自不敢輒加禁遏止縁上司指揮不得妄増米價本欲少抑兼并存恤細民不知四境之外米價差髙小民欲増錢糴於上户輒為小人脅持獨牙儈乃平立文字私加錢於糶主謂之暗㸃人之趨利如水就下是以牙儈可糴而土民闕食今若不抑其價彼將由近而及逺矣安忍專糶於外邑人哉一紹興五年行在㪷米千錢時留守叅政孟庾户部尚書章誼亦不抑價大出陳廩毎升糶二十五文僅得時價四之一旣於小民大有所濟次年米賤令諸路以上供錢収糴復多贏餘况村落騰湧極不過三兩月民若食新則價自定矣檢旱煟曰災傷水旱而告之官豈民間之得已今之守令專辦財賦貪豐熟之美名諱聞荒歉之事不受災傷之状責令里正伏熟為里正者亦慮委官經過所費不一故妄行供認以免目前陪費不慮他日流離餓莩刼奪之禍良可嘆也一在法陳訴旱傷之限至八月終止訴在限外不得受理昨來臣寮奏請晚禾成熟乃在八月之後今旱有淺深得雨之處有早晚之不同乞寛期限得㫖展半月臣寮申請乞以指揮到縣日為始一淳熈元年孝宗御劄委帥臣監司令從實檢放不得信憑保正伏熟時憲司揭榜許人户經本州陳狀别差官檢放時已十一月矣及帳目到户部户部以令文至八月終止出限者不合受理皆不為除放而人户恃憲司榜示不肯輸納鞭撻過多反為民害一元祐元年諫議大夫孫覺言諸路災傷各以實言不實者坐之災傷雖小而言涉過當者不問今民間縱有被訴災傷縣道往往多不受理間有受理去處又不及時差官檢踏比至秋成田間所有雖曰無幾其服田之家只得隨多少収割以就耕墾官司惟見民間収割已畢便指作十分豐熟不容檢収是時開場受納遂即舉催全苗貧民下户欲訴則田無可騐之禾欲納則家無見儲之粟於是始伐桑柘鬻田産流離轉徙棄墳墓而之四方矣減租煟曰謹按唐人水旱損四則免租損六則免調損七則租庸調俱免今之夏稅則唐人之調絹也役錢則庸直也今州縣水旱十分去處而夏税役錢未有減免之文至於檢放止及田租耳猶切切焉勺合之是計全未識古人用其一緩其二之意臣㓜讀畢仲衍元豐備對錄記熈寧全盛時天下兩稅錢五百五十餘萬緡頃年户部侍郎劉邦翰上奏天下經總制錢嵗額二千萬緡而實到者亦千萬緡夫斯錢者唐人除陌之類而其數乃倍於承平時正賦且又東南之一隅民困極矣脱遇水旱是可不為寒心而思所以寛恤之哉貸種煟曰貸種固所以惠民然不必責其償也人情易于貸而難于償征催不集必有勾追鞭撻之患青苗之法可見矣仁宗朝江南嵗饑貸民種糧十萬斛屢經倚閣而官司督責不已貧民不能自償上憐而蠲之周世宗亦謂淮南饑當以之貸民或曰民貧恐不能償世宗曰安有子倒垂而父不為之解者安在責其必償也今之議貸種糧者當識此意名之曰貸防其濫請之弊耳其所可憂者抄劄之際利未之及而擾先之若措置施行之得人此等皆不足為慮恤農煟曰耕而食者農民也不耕而食者游手浮食之民也自來官司之賑給常先市井之游手與鄉落之浮食而緩於農民耕夫且農家寒耕熱耘以供衆人之食及其饑也不耕者得食而耕者反不得食不免採掘蕨根野葛以充飢腸豈不甚可憐哉臣謂今行抄劄之時自五家為甲遞相保委同其罪罰曰某人為游手某人為工某人為商某人為農而官之賑給以農為先浮食者次之此誘民務本之一術也遣使煟曰古人救荒或遣使開倉遣使賑恤遣使循行周詢民間疾苦然法令尚簡故所過無擾比來諸道置使民間利害悉以上聞安有水旱之不知其所缺者在於賑濟無術類多虛文耳今但責監司郡縣推救荒之實政則民受其惠不然民方飢餓官方窘匱而王人之來所至煩擾未必實惠及民而先被其擾者多矣神宗時司馬光曰今朝廷毎有一事不委之將帥監司守宰使自為方略責以成效而施刑賞常好遣使者銜命奔走旁午於道徒有煩擾之弊而於事未必有益不若勿遣之為愈也弛禁煟曰古人澤梁無禁闗市譏而不征今山林河泊各有所主又民心不醇一聞榜示因而砍伐墳林大起争競則弛澤梁之禁已為難行惟有場務邀阻米船此當禁約耳然比年場務課額稍重多藉舟車雖令文米麥不許収稅而場務别為名色號曰公使錢多端邀阻雖累降指揮諸處埸務不得將客米船違法収稅庻幾商賈興販然終未能革臣謂為監司太守莫若每遇凶荒去處相度饑年大小奏之朝廷乞權減場務課額一月或半月如此則少寛煎逼之弊自然不敢重困米船亦古人凶年弛禁之意况淳熈令課利場務經災傷者各隨夏秋限依所放分數於租額除豁鬻爵煟曰名器固不可濫然饑荒之年假此以活百姓之命權以濟事又何患焉謹按乾道七年八月􅃯節文湖南江南旱傷委州縣守令勸誘有米斛富室上户如有賑濟饑民今來立定格目補授名次今具下項無官人一千五百石補進義校尉願補不理選限將仕郎聽二千石進武校尉如係進士與免文解一次如不係進士候到部與免短使一次四千石補承信郎如係進士與補上州文學五千石承節郎如進士補廸功郎文臣一千石減二年磨勘係選人循一資二千石減三年磨勘係選人循一資仍與占射差遣一次三千石轉一官係選人循兩資仍占射差遣一次五千石以上取㫖優異推恩武臣一千石減二年磨勘陞一年名次二千石減三年磨勘占射差遣一次三千石補轉一官占射差遣一次五千石以上取㫖優異推恩勘㑹旱傷州縣勸誘積粟之家賑濟係崇尚風誼即與進納事體不同三省同奉聖㫖依擬定令帥臣監司將勸誘到米斛依數著實置厯拘収委官賑濟務令實惠及民仍開具出米人姓名并米數保明申取朝廷指揮依人米立定賞格推恩出給付身其賑糶之家依此減放推賞如有不實官吏重作施行臣謂民間納米而即得官誰不樂為只縁入米之後所費倍多未能遽得故多疑畏今上下若能懲革此弊先給空名告身付之則救荒不患無米矣或謂大將軍告身才易一醉其弊若何不知鳯翔軍興用之無節今只饑荒地分數月計耳就豐熟即已之何濫之有度僧煟曰度牒換米葢亦一時權宜所當行議者咸謂度牒廣行人丁喪失不知今日游民甚多而所謂童行者不可數計今日度牒一本度一人為僧而活有十人之命何憚而不為然平時所以不輕出者政為緩急之舉也淳熈九年勅勘㑹已降指揮令廣東福建帥臣曉諭願為僧道之人每名備米三百石請換度牒一道續降指揮給到空名度牒一百道付紹興府毎道許人户以米三百石請換慮恐米數稍多聖㫖毎道特與減五十石餘依已降指揮今乞依倣孝宗之法施行然須州郡相度申請可也治盜煟曰凶年飢歳民之不肯就死亡者必起而為盜以延旦夕之命倘不禁戢則嘯聚猖獗其患有不可勝言者臣嘗聞乾道間饒郡大饑諸處嘯聚開廩刼奪者紛然時通守柴瑾封劔付諸縣曰敢為渠魁者斬之羣盜望風遯匿淳熈十五年徳興饑荒民有剽掠道路者縣令曽棐亷得二人鎻項號令於地頭日給米一升俟來年麥熟日放盜賊由是衰止紹興四年樂平饑村民攜錢市米山路遇亡命縛而取之邑宰楊簡曰此曹㫁刺則復為盜配去則復逃歸㫁一足筋𫝊都示衆一境肅然此雖一時之政然深合周公荒政除盜賊之意捕蝗煟曰太宗吞蝗姚崇捕蝗或者譏其以人勝天臣曰不然天災非一有可以用力者有不可以用力者凡水與霜非人力所為姑得任之至於旱傷則有車戽之利蝗蝻則有捕瘞之法凡可以用力者豈可坐視而不救耶為守宰者當激勸斯民使自為方略以禦之可也呉遵路知蝗不食豆苗且慮其遺種為患故廣収豌豆教民種食非惟蝗虫不食次年三四月間民大獲其利古人處事其周悉如此臣謹按熈寧八年八月詔有蝗蝻處委縣令佐躬親打撲如地里廣闊分差通判職官監司提舉仍募人得蝻五升或蝗一㪷給細色穀一斗蝗種一升給麤色穀二升給價錢者作中等實直仍委官燒瘞監司差官覆按以聞即因穿掘打撲損苗種者除其税仍計價官給地主錢數毋過一頃則本朝之法尤為詳悉和糴煟前嘗論和糴之弊在於籍數定價不能因嵗上中下熟須一依民間實直寧毎升髙於時價一二文以誘其來或難臣以此説不可行葢今民間無錢若官司和糴増長米價則小民目下之患大為不便臣曰不然和糴本穀賤傷農増價以稱提之耳若此處不熟米價騰湧又何於此而糴哉古人和糴皆行於豐熟去處其間止縁官司識見淺陋以得小利為己功糴買之官低價滿量以備交納之折交量之所飛斛弄㪷以為乞索之端上下誅求遂致失時艱於及數將來計無所出必有配抑之患今誠能及時収之多寡相時水脚之費交量之弊抑價之説一切盡革又何患焉然臣之所深慮者在于官司知糴而不知糶夫積而不散非惟化為埃塵虧折常平糴本而民間之米由是愈少矣此為政者所當致思然饑荒之年非獨収糴粳米而已凡粟豆蕎麥之類茍可以救民命者亦何所擇存恤流民煟曰流民如水之流治其源則易為力遏其末則難為功若本處地分賦歛稍寛自然安土重遷誰肯移徙凡所以離鄉井去親戚棄墳墓皆非其所得已也臣親見浙人流移過淮甸者始焉扶老攜㓜接踵于道或轉死于溝壑者多矣然本處不可存活而抑之使不得動於理固逆至於一動之後中途官司禁遏抑勒使之復囘此又非所宜也臣謂今未流者固宜賑救已流者莫若令所過州縣多方存恤推行富弼之法以濟之然富弼之法人罕得其詳臣今編録于末卷勸種二麥煟曰春秋於他不書惟無麥即書仲舒建議令民廣種宿麥無令後時葢二麥以新陳未接之時最為得力不可不廣也按四時纂要及諸家種藝之書八月三夘日種麥十倍全収今民非不知種但貧而無力故後時耳古人春省耕而補不足秋省歛而助不給今為政者於饑之年能捐帑廩推行補助之法此非徒救荒亦因寓務農重本之意通融有無煟曰通融有無真救荒活法然而其法有公有私何謂公曰支撥官廩借兊内庫如假軍儲以救民饑者是也何謂私曰勸人𤼵廩勸人糴販勸誘商賈率錢販米歸鄉共濟鄉人者是也臣謹按淳熈九年常州無錫饑臣寮奏乞令提舉司速急於平江府通融支常平斗斛或借撥别邑米前去接續賑恤得㫖於平江府朝廷樁管米内支三千石接續賑濟又乾道元年浙西被水臣寮言太平州蕪湖見樁管常平米一十六萬石未有支使聖㫖令臨安府於内取撥五萬石平江府常州三萬石湖秀各二萬石鎮江府一萬石仰逐州舊下差官押𤼵人船前去般取專充賑糴不得他用其糶到錢逐項樁管秋成収糴撥還此則孝宗誠知通融之術今日宜當舉行之借貸内庫煟曰天子不當有私財私財充羨則侈心生李迪在翰林仍歳旱蝗國用不足一日歸沐忽𫝊詔對内東門上出三司所上歲出入財用數目問何以濟迪曰祖宗初置内藏庫復西北故土及以支凶荒今邊無他費陛下用此佐國用財賦寛則民不勞矣上曰今當出金帛數百萬借三司迪曰天子於財無内外願下詔賜三司以顯示徳澤何必曰借上恱從之然則今之州郡間有仍歳凶歉去處而匱乏無策者可不斟酌多寡撥賜以為糴本耶守臣到任預講救荒之政煟曰救荒無定法風土不一山川異宜惟在預先講究而已今欲諸州守臣到任不以逺近限一月以後詢究本州管下諸縣鎮可以為救荒之備及其他措置之策講求實惠斷然可行者不拘件數條具奏聞與斟酌可否行下責令本州守臣自守其説如任内設遇旱澇即檢舉施行不得自有違戾外委監司内委臺諫常切覺察臣謂救荒有賑糶有賑濟有賑貸三者其名各不同而其用亦各有體誠能識認其體則實惠及民矣今條陳於後賑糶此係用常平米其法在於平凖市價黙消閉糴之風如市價三十文一升常平只等糴時本錢或十五六至二十文一升出糶然出糶之時亦須遍及鄉縣村落之民不可止及城郭游手而已若所蓄之米度不足支用當以常平錢委官四出於有米去處循環糶糴務在救民不得計較所費規圖小利以為己能然施行之際須令上下官吏咸識此意乃可賑濟此係用義倉米其法當及老㓜殘疾孤貧不能自存之人使無告者免於夭亡然亦不可止及城郭或米不足則近來州縣有義倉錢當用此錢廣糴豆麥穀粟之類同共賑給或散錢與之但抄劄之際須當革弊臣親見徽州婺源村落賑濟里正先赴門抄劄每家覔錢無錢者不與抄名逮至官司散米皆陳腐沙土不可食之物得不償失極為可恨然全在施行委選得人村落之間又各委本土公正有望為鄉閭所信服者不可信憑公人所舉須參寄居及土人賢者之論庻人望稍服仍先延見委諭之因察其人物不許子弟代名出官時以盃酒禮貎激動使樂為效命又須有術察其任私不職者略責一二以警其餘然此等設施非可一概論又在臨機應變也賑貸此係截留上供米或者省倉米或為朝廷乞封樁米或於諸色倉厫權時那用一面申奏朝廷借内庫乞度牒糴米補還其法專及中等之户與夫農民耕夫之無力者既不取息其勢必償此真得以陳易新之術家計不過一石但支給之際戒有虛偽催索之時戒有搔擾交納之時戒有乞覔仍不得用小㪷量出大㪷交入須用収支㪷斛一同又不得取民間頭子朱墨勘合抄紙等錢其間實係流亡或有不能償者姑已之譬之賑濟一散無収亦豈有責其必償哉此乃官司一時救荒之舉縱有陪費失䧟居上者亦當以社稷報本為念是乃利國家之大者也唐劉景先進救荒仙方唐永寧三年七月二十七日黄門侍郎劉景先上表云臣遇太白山隱士傳此法聞京師米糧大貴飢死人民吾將此法令人服食即得不飢顔色充恱氣力加倍可以濟人之命臣聞之驚愕謂是狂言又云吾服此藥五年不食矣但依吾法貴賤皆服不問少長永可不飢臣遂依法修製令家中兒女大小服之五箇月不食耳目聰明身輕體健氣力強壯臣家中七十餘口更不食别物惟飲水一巵若不如斯臣一家甘受誅戮具方於後四季用黒豆五㪷淘洗乾後蒸三遍去皮大麻子三㪷浸一宿控出蒸三遍令開口去殻用豆五升麻子三升作小料亦可右先搗豆黄為細末然後搗麻子仁極細漸漸下豆黄令匀作圓子如拳頭大入甑内蒸過從晨著火至夜半子時住火直至天曉出甑至午時曬乾搗為細末服之但以不飢為度不得食一切别物第一頓七日不飢第二頓四十九日不飢第三頓得三百日不飢第四頓得三千四百日不飢如更服永不飢也不問老少但依服食令人強壯面色紅白無有憔悴渴中飲新汲井水或研火麻子漿飲之若要重喫物用葵菜子碾為末煎湯冷服當下藥如金色但喫諸物並無所損今具旱傷􅃯令格式下項淳熈令諸官私田灾傷夏田以四月秋田以七月水田以八月聽經縣陳訴至月終止若應訴月并次兩月過閏者各展半月訴在限外不得受理非時灾傷者不拘月分自被灾傷後限一月止其所訴狀縣錄式曉示又具二本不得連名如未檢覆而改種者並量留根查以備檢視不願作灾傷者聴諸受訴灾傷狀限當日量傷灾多少以元狀差通判或幕職官本州缺官即申轉運司差州給籍用印限一日起𤼵仍同令佐同詣田所躬親先檢見存苗畝次檢災傷田改具所詣田所檢村及姓名應放分數注籍毎五日一申州其籍候檢畢繳申州州以狀對籍㸃檢自往受訴狀復通限四十日具應放税租色額外分數榜示元不曽布種者不在放限仍報縣申州州自受狀及檢放畢申所屬監司檢察即檢放有不當監司選差隣州官覆檢若非親檢次第照依州委官法失檢察者提舉刑獄司覺察究治以上被差官不許辭避諸官私田災傷而訴狀多者令佐分受置籍其載以税租簿勘同受狀五日内繳申州本州限一日以聞諸訴災傷狀不依全式者即時籍記退換理元下狀日月不得出違申州日限淳熈􅃯諸縣灾傷應訴而過時不受狀或抑遏者徒二年州及監司不覺察者減三等諸鄉書手貼司代人户訴災傷者各杖一百因而受乞財物贓重者坐贓論加一等許人告諸州縣及被差檢覆灾傷於令有違者杖一百檢放官不躬親徧諸田者以違制論諸詐稱災傷減免稅租者論迴避詐匿不論律許人告淳熈格告獲詐稱灾傷減免税租者杖罪錢一十貫徒罪錢二十貫流罪錢三十貫告獲鄉書手貼司代人户訴災傷狀者毎名錢五十貫三百貫止淳熈式􅃯訴災傷狀某縣某鄉村姓名今具本户災傷如後一户内元管田若干頃畞某都計夏秋税若干夏稅某色若干秋稅某色若干非已業田依此别為開拆一今種到夏或秋某色田若干頃計某色若干田係旱傷損或損餘灾傷處隨狀言之某色若干田苗色見存如全損亦言灾傷及見存田並每叚開折右所訴田段各立土埄牌子如經差官檢量却與今狀不同先甘虛妄之罪復此額不詢謹狀年月日姓名檢覆灾傷狀檢覆官具位准某處牒帖據某鄉申人户被訴灾傷某等尋與本縣某官姓名詣所訴田段檢覆到合放稅租數取責村鄉又結罪保證狀入案如後某縣據某人等若干户某月終以前兩縣以上各依此例披訴狀為某色災傷如限外非時灾傷則别具某日月至某月日投披訴之非正色共若干合放每色若干租課作正税右件狀如前所檢覆只是權放某年夏或秋一料内租即無夾帶種時不敷及無狀披訴并不係灾傷妄破稅租保明是實如後具同甘俟朝典謹具申某處謹狀年月日依常式淳熈令諸承買官田宅納錢有限而遇灾傷本户放稅及五分者再展半年再遇者各准此諸州雨雪過常或愆亢提舉常平司體量次第申尚書户部蟲蝗水旱州申監司各具施行次第以聞如本州隱蔽或所申不盡不實監司體訪奏聞淳熈令諸州縣豐熟灾傷轉運司約分數奏聞其未収者監司知州不許預奏豐熟救荒活民書卷中
