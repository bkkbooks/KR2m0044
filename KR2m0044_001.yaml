body:
  text: 救荒活民書卷上宋董煟撰帝曰棄黎民阻饑汝后稷播時百糓禹曰洪水滔天浩浩懐山襄陵下民昏墊予乗四載隨山刋木暨益奏庶鮮食予决九川距四海濬畎澮距川曁稷播奏庶艱食鮮食懋遷有無化居烝民乃粒萬邦作乂煟曰唐虞之時國用尚簡上之人取於民者甚少凡山澤之利盡在於民故當阻飢之際特使通融有無而已今世民困財竭則通融有無須上之人有以考之然規模淺陋者猶滯於一隅殊失唐虞懋遷之意湯旱而禱曰政不節歟使民疾歟何以不雨而至斯極也宮室崇歟婦謁盛歟何以不雨而至斯極也苞苴行歟䜛夫昌歟何以不雨而至斯極也煟曰公孫𢎞以湯之旱為桀之餘烈遂有以啟武帝之玩心大抵天變如父母之震怒為人子者知其雖非在已亦當恐懼敬事以得父母之懽心成湯聖人平時豈有此六事然必一一以為言者所以見其敬天之至也况未至成湯者可不自責哉大司徒以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾闗市不譏也七曰𤯝禮凶荒殺禮八曰殺哀九曰蕃樂蕃讀為藩謂閉蔵樂器而不作十曰多昏十有一曰索鬼神求廢祀而修之也十有二曰除盜賊煟曰周禮救荒以散利薄征居其首今之郡縣專促辦財賦而諱言灾傷州縣之官有抑民吿訴者檢視之官有不敢保明分數者非不識古人活民之意顧亦迫於諸司之征𣙜有所不暇計慮耳然以生民社稷為念者忍無策以處之大荒大札則令邦國移民通財舍禁弛力薄征緩刑煟曰謹按注云大荒大凶年也大札大疾疫也移民者辟災就賤也其有守不可移者則輸之穀梁王移民粟之舉正得周禮救荒之遺意而孟子不取者非不取夫此也特譏其平居無事不能行仁政徒知罪嵗而已耳遺人掌邦之委積以待施惠鄉里之委積以恤囏厄門闗之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待凶荒煟曰今之義倉誠得遺人委積之遺意然散貯於鄉里郊野縣都之間故所及者均遍比年義倉專輸之州縣一有凶歉村落不能遍及矣今有仁人在上安保其無復倣此意而行之者乎國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂煟曰古稱九年之蓄者蓋率土臣民通為之計固非獨豐廩庾而已後代失典籍備慮之意忘先王子愛之心所蓄粮儲惟計廩庾不知國富民貧其禍尤速今州縣有常平倉有義倉朝廷諸路又有封樁米斛至於大軍倉豐儲倉州倉縣倉皆不與焉但賦歛繁重民間實無所蓄耳然官之所蓄又各有司存而不敢𤼵馴致積為埃塵盍亦講求古人凶年通財之義乎宣王承厲王之烈内有撥亂之志遇烖而懼側身修行欲銷去之詩曰天降喪亂飢饉薦臻靡神不舉靡愛斯牲又曰靡人不周無不能止煟曰靡神不舉靡愛斯牲說者謂慰安人心然山川禱祠從古有之亦見古人憂畏之切至於靡人不周無不能止自非當時有實惠及民安能如是月令季春之月天子布德行惠命有司𤼵倉廩賜貧窮賑乏絶煟曰古人賑給多在季春之月盖蠶麥未登正宜行惠非特饑荒之時方行賑濟而已隱六年京師來告饑公為之請糴於宋衛齊鄭禮也莊二十八年冬飢臧孫辰告糴於齊禮也煟曰春秋之時諸侯竊地專封然同盟之國猶有救患分灾之義未嘗遏糴也今之郡縣不知本原但不容米下河出界回視春秋列國為有愧矣國語魯饑臧文仲言於莊公曰夫為四鄰之援結諸侯之信重之以昏姻申之以盟誓固國之艱急是為鑄名器藏寳財固民之殄病是待今國病矣君盍以名器請糴於齊於是以鬯圭玉磬如齊告糴曰不腆先君之敝器敢告滯積以救敝邑煟曰饑荒之年古人雖鬯圭玉磬皆不敢惜猶以請糴今常平義倉本備飢荒内帑之積軍旅之外本支凶年若吝而不𤼵誠未考古耳僖十二年冬晉荐饑使乞糴於秦百里奚曰天灾流行國家代有救灾恤鄰道也行道有福秦于是輸粟於晉自雍及絳相繼命之曰汎舟之役僖十四年秦飢乞糴於晉晉人不與僖十五年晉侯及秦伯戰於韓獲晉侯傳云晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉煟曰春秋於諸侯無書獲之例而經書曰獲晉侯貶絶之也春秋之世王道不絶如綫一閉糴而聖人誅之本朝列聖視民如傷屢降詔㫖不許諸路遏糴坐以違制而邇來官司各專其民輒違上意此皆講求未至耳僖二十一年夏大旱欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務穡勸分有無相濟此其務也煟曰有無相濟真救荒之良法今州縣各私其民官司各私其職莫肯通融異縣貯儲不恤鄰邑哀哉春秋之時鄭饑未及麥民病子皮餼國人粟户一鍾是以得鄭國之民故罕氏世掌國政以為上卿宋饑司城子罕出公粟以貸使大夫皆貸司城氏貸而不書宋無饑人晉叔向聞之曰鄭之罕宋之樂二者其皆得國乎煟曰子皮子罕為二國之卿固與宰天下者大相逺不知其惠之所及者能幾而天之祐善罕氏遂世掌國政於鄭樂氏遂有後於宋葢亦傳所謂天灾流行國家代有行道有福者理必然耶管仲相桓公通輕重之權曰嵗有凶穰故穀有貴賤民有餘則輕之故人君歛之以輕民不足則重之故人君散之以重使萬室之邑有萬鍾之藏千室之邑有千鍾之藏故大賈蓄家不得豪奪吾民矣煟曰李悝之平糴壽昌之常平其源盖祖於此今之和糴者務求小利以為功殊忘歛散所以為民之意哀公問於有若曰年饑用不足如之何對曰盍徹乎曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足煟曰聖賢救荒大抵以寛征薄賦為先書曰民為邦本本固邦寧葵丘之㑹五命曰無曲防無遏糴煟曰趙岐注云無曲防無曲意設防禁也無遏糴無止穀不通隣國也然必當時已有遏糴之患故齊威因諸侯之㑹而預戒之梁惠王曰寡人之於國也盡心焉耳矣河内凶則移其民於河東移其粟於河内河東凶亦然察鄰國之政無如寡人之用心者隣國之民不加少寡人之民不加多何也孟子迺以王政告之曰今狗彘食人食而不知檢塗有餓莩而不知𤼵人死則曰非我也歲也王無罪歲斯天下之民至焉煟曰人君平居無事横征暴歛不能使民養生喪死而無憾一遇水旱雖移民移粟孟子以為不知本李悝為魏文侯作平糴之法曰糴甚貴傷民甚賤傷農若民傷則離散農傷則國貧故甚賤與甚貴其傷一也善為國者使民無傷而農益勸故大熟則上糴三而舍一計民食終嵗長四百石官糴二百石中熟糴二下熟糴一使民適足價平而止小饑則𤼵小熟之歛中饑則𤼵中熟之歛大飢則𤼵大熟之歛而糶之故雖遇饑饉水旱糴不貴而民不散取有餘而補不足行之魏國國以富強煟曰今之和糴其弊在於籍數定價且不能視上中下熟故民不樂與官為市所為患者吏胥為姦交納之際必有誅求稍不滿欲量折監賠之患紛然而起故糴買之官不得不低價滿量豪奪於民以逃曠責是其為糴也烏得謂之和哉至於已糴之後又不能以新易陳故積而不散化為埃塵而民間之米愈少也漢食貨志曰吏良而令行故民賴其利焉誠哉是言漢興接秦之敝諸侯並起民失業作而大饑饉米石五千人相食死者過半髙祖乃令饑民就食蜀漢文帝後元六年大旱蝗弛山澤𤼵倉庾以濟民煟曰宣帝本始三年旱後漢章帝元年旱並免民租稅漢家救荒大抵厚下景帝後元二年令内史郡不得食馬粟没入縣官令徒𨽻衣七緵布止馬舂為嵗不登禁天下食不造嵗省列侯遣之國煟曰謹按曲禮嵗凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂玉藻曰年不順成君衣布搢本闗梁不租山澤列而不賦土功不興大夫不得造車馬榖梁曰大侵之禮君食不兼味臺榭不塗鬼神禱而不祀古人救荒之政凡可以利及於民者靡不畢舉景帝所行皆得古人救荒之遺法所以與文帝並稱為賢君歟鼂錯曰人情一日不再食則饑終嵗不製衣則寒腹饑不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然故務農桑薄賦歛廣蓄積以實倉廩備水旱故民可得而有也夫珠玉金銀饑不可食寒不可衣故明君貴五榖而賤金玉煟曰陸贄嘗謂國家救荒所費者財用所得者人心今錯謂腹饑不得食雖慈母不能保其子人君安能以有其民此意惟贄得之錯建言今募天下入粟縣官得以拜爵除罪又言入粟郡縣足支一歲以上時赦勿收民租如此則德澤加於萬民若遭水旱民不困乏其後上郡以西旱復修賣爵令煟曰國家賑濟之賞非不明白五千石承節郎進士迪功郎四千石承信郎進士補上州之學然近年州縣行之無法出粟之後所費不一故民有不願就者焉武帝時河内失火延燒千餘家上使汲黯往視之還報曰家人失火屋比延燒不足憂臣過河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節𤼵河南倉粟以賑貧民臣請歸節伏矯制之罪上賢而釋之煟曰古者社稷之臣其識見施為與俗吏固不同也黯時為謁者而能矯制以活生靈今之太守號曰牧民一遇水旱牽掣顧望不敢專决視黯當内愧矣元封元年旱上令官求雨卜式言縣官當食租衣稅而已今𢎞羊令吏坐市列肆販物求利烹𢎞羊天乃雨煟曰桑𢎞羊領大農作平凖之法於京師令逺方之物如異時商賈所轉販者為賦盡籠天下之貨物貴則賣之賤則買之萬物不得騰踊民不益賦而天下用饒當時議者猶欲烹之謂奪民之利傷和氣也今民利無遺矣而聚歛之臣黙思𢎞羊可烹之語可不寒心哉元封四年闗東流民二百萬口無名數者四十萬公卿議欲徙流民於邊丞相石慶上書乞骸骨上詔報切責之煟曰流民移徙誠當安集勞來乃欲徙之於邊固非良䇿顧乃切責宰相武皇救荒之術疎矣本朝富弼青州賑救流民規畫過於漢家逺甚武帝元鼎元年詔曰京師雖未為豐年山林池澤之饒與民共之今水潦移於江南迫隆冬至朕懼其饑寒不活方下巴蜀之粟致之江陵遣博士等分行諭告所抵無令重困吏民有賑饑民免其厄者具舉以聞煟曰江南水潦下巴蜀之粟致之江陵其通融有無不滯於一隅與近來州縣配抑認米賑糴有間矣是時師旅宮室百役並興而憂民之心其切如此武帝所以異於秦皇也宣帝五鳯四年豐穰穀石至五錢耿壽昌建言令邊郡皆築倉以穀賤時増價而糴以利農穀貴時减價而糶以利民名曰常平倉民甚便之煟曰漢之常平止立於北邊李唐之時亦不及於江淮以南本朝常平之法遍天下葢非漢唐之所能及也元帝即位大水齊地饑民多餓死諸儒多言鹽鐵官常平倉可罷毋與民争利上從其議皆罷煟曰鹽鐵可罷而常平不可罷但釐革其弊可耳今乃遽罷之過矣元帝之失豈特優柔無斷歟王莽時南方枯旱使民煮木為酪酪不可食重為煩擾又令饑人掘鳬茈食之流民入闗者數十萬人置養贍院以廩之吏盜其廩饑死十七八煟曰木豈可煮以為酪莽之規模如此其即日敗亡也宜哉後漢建武六年春詔曰徃嵗旱蝗蟲為灾人用困乏其令郡國有穀者廩給永興二年詔五穀不登其令郡國種蕪菁以助人食煟曰飢年食蕨根煮野菜拾橡子採聖米凡可以度命之計者隨所在而為之無遺法要是上之人當有以通融之使下無遏糴抑價閉糶之患斯為上也永元五年遣使者分行三十餘郡貧民開倉賑給六年詔流民所過郡國皆廩之永初二年遣光禄大夫樊凖呂倉分行冀兖二州廩貸流民煟曰近嵗温台衢婺流民過淮甸者接踵於道衝冐風雪扶老攜㓜狼狽者不可勝言而為政者不聞其留意者不過張榜河渡勸抑使還豈知業已破蕩歸無自安之路矣囘視所過郡國皆廩之者寧不愧哉魏黄初二年冀州大蝗嵗饑使尚書杜畿持節開倉廩以賑之五年冀州饑遣使者開倉廩賑之六年春遣使者巡行沛郡問民間疾苦貧者賑貸之孫權赤烏三年民饑詔遣使開倉廩賑貧者晉武帝泰始三年青徐兖州水遣使賑恤煟曰人主身居九重每患下情不能上達故遣使若孫權曹操立國之初禮儀簡略故使者所過無煩擾本朝諸路置使一有水旱而諸司悉以上聞矣此其享國之長所以過於前代隋文帝開皇三年置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年皆著於令煟曰今之常平義倉多藏米而少藏粟故積乆不𤼵化為埃塵非但支移之弊而已近有臣寮奏請慮立法太重而上下蔽䝉虚文為害乞令州縣各具見在常平錢米實數與提舉司差官盤量檢㸃自今日以後不許他用而盡赦其日前支移之罪庶幾緩急之際不至有誤其説似可行也唐太宗謂王珪曰開皇十四年大旱隋文帝不許賑給而令百姓就食山東比至末年天下儲積可供五十年煬帝恃其富饒侈心無厭卒亡天下但使倉庾之積足以備凶年其餘何用哉煟曰蓄積藏於民為上藏於官次之積而不𤼵者又其最次太宗咎隋文積粟起煬帝之侈心其規模宏逺不樂聚歛可知矣近世救荒有司鄙吝不敢盡𤼵常平之粟至於豐儲廣惠等倉又往往乆不支動化為埃塵諒未悉太宗之意闗中旱饑民多賣子以接衣食詔出御府金帛為贖之歸其父母詔以去嵗霖雨今兹旱蝗赦天下其略曰若使百姓豐稔天下乂安移灾朕身以存萬國是所願也甘心無吝㑹所在有雨民大恱煟曰王者以得民為本凡此舉動皆足以得民之歡心太宗真至治不世出之主哉畿内有蝗上入苑中見蝗掇數枚祝之曰民以穀為命而汝食之寧食吾之肺肝舉手欲食之左右諌曰惡物或成疾上曰朕為民受灾何疾之避遂吞之是嵗蝗不為灾煟曰太宗存心愛民觀其朕為民受災何疾之避之語其愛民之心真切如此宜其一念感通蝗不能為害也太宗置義倉常平倉以備凶荒髙宗以後稍假義倉以給他費至神龍中略盡元宗即位復置之其後第五琦請天下常平倉皆置庫以蓄本錢徳宗時趙賛又言自軍興常平倉廢垂三十年凶荒費散餒死相食不可勝紀自陛下即位京城兩京置常平雖頻少雨澤米不騰貴可推而廣之徳宗納其言煟曰常平和糴救荒實政然嘗觀憲宗即位之初有司以歲豐熟請畿内和糴當時府縣配户督限有稽違則迫蹙鞭撻甚於賦稅號為和糴其實害民今之和糴者可不鍳懲此弊乎大厯二年秋霖損稼渭南令劉澡稱縣境苗獨不損上曰霖雨溥博豈渭南獨無更命御史朱教視之損三千餘頃上嘆曰縣令字民之官不損猶應言損乃不仁如是乎貶澡南浦尉煟曰代宗斯言真得人君之體然今之縣令孰無愛民之心顧惟一有荒歉縣道固難支吾矣而上司責令賑救供報紛然費擾不一又有使者不測巡按吏輩誅求小不滿意則妄生事端由是月樁月解愈難辦集今須上官先灼見此弊上下同心勤恤民隱可也貞元十四年旱民請蠲免租京兆尹韓臯慮府帑已空奏不敢實其後事聞於上貶撫州司馬煟曰旱傷所當賑恤儻不蠲租則催科日逼而民必思亂其禍有不可測者韓臯之貶也宜哉元和間南方旱饑遣使賑恤將行憲宗戒之曰朕宫中用帛一匹皆計其數惟賑恤百姓則不計所費卿輩當體此意煟曰洪範云天子作民父母以為天下王謂之作民父母當以斯民為念憲宗云惟賑恤百姓則不計所費非惟識人君之體正與洪範父母之意合憲宗元和七年上謂宰相曰卿輩屢言淮南去嵗水旱近有御史自彼還言不至為灾李絳對曰御史欲為姦諛以恱上意耳上曰國以人為本民間有災當急救之豈可復疑即命速蠲其租煟曰陸贄論江淮水旱有云流俗多狥謟諛揣所恱意則侈其言度其惡聞即小其事斯言正與李絳合咸通十年陜民訴旱觀察使崔嶤指庭樹曰此尚有葉何旱之有杖之民怒作亂逐嶤煟曰水旱灾傷而不知以民為念其禍必至於此書曰臣為上為徳為下為民若嶤者失其所以為民之義矣安知輔上之徳哉懿宗時淮北大水征賦不能辦人人思亂及龎勛反附者六七萬人自闗東至海大旱冬蔬皆盡貧者以蓬子為麵槐葉為虀乾符中大旱山東饑中官田令孜為神策中尉怙權用事督賦益急王仙芝黄巢等起天下遂亂公私困竭昭宗在鳯翔為兵所圍城中人相食父食其子天子食粥六官及宗室多饑死而唐祚遂亡煟曰當太宗時元年饑二年蝗三年大水上憂勤而撫之至四年而米斗四五錢觀此則知廣明之亂雖起於饑荒之餘亦上之人無憂民之念耳葢天下非有水旱之可憂而無水旱之備者為可懼同光三年大水兩河流徙莊宗與后畋逰是時大雪軍士寒凍宰相請出庫物以給軍后不許宰相論於延英后居屏間屬耳因取粧奩及皇子滿喜置帝前曰諸侯所貢給賜已盡宮中惟有此耳請鬻以給軍及趙在禮亂始出庫物以賚之軍士負而訴曰吾妻子已餓死得此何為上曰適得魏王報平蜀得金銀五十萬盡給爾等曰與之太晚得之亦不感恩煟曰嘗考周人財用之制有内府以受其藏有職内以受其用宜可以縱一人之欲然天子無私藏王后無移用者以冡宰制財用之故歲荒民乏則權或薄征或散利皆可以通融筭有無天子歛其財特以為天下之用而吾身無與焉自漢人以私藏歸之少府專供上用後世因之為私有於是民雖告病而上不知恤海内旣貧而人主獨富凡内庫所蓄欲損尺帛斗粟以及民而重如丘山盖流弊之極有如莊宗者可不鍳哉國朝建隆元年遣户部郎中沈倫使呉越歸奏揚泗饑民多死郡中軍儲尚百餘萬斛可貸於民至秋復収新粟有司沮倫曰今以軍儲賑饑民嵗若荐饑惡所収取孰任其咎帝以難倫倫曰國家以廪粟濟民自當召和樂而致豐年豈復有水旱耶帝即命𤼵廩貸民煟曰聖主所為其英謀睿斷自有出人意表者敬觀太祖皇帝不惑羣議𤼵軍儲以救民飢真得通融有無以陳易新之術乾徳元年夏四月詔諸州長吏視民田旱甚者則蠲其租不俟報煟曰嵗之灾變旱傷至易曉也歴時不雨孰不知旱旱則命長吏上聞而蠲其租何必俟報臣見今時州縣或遇灾傷兩次差官檢覆使生民先被騷擾之苦然後量减租入之數所得幾不償所費矣宜以乾徳之詔為法至道二年詔官倉𤼵粟數十萬石貸京畿及内郡民為種有司言請量留以供國馬太宗曰民田無種不能盡地利且竭廩以給之國馬以蒭藁可矣煟曰廐焚子退朝曰傷人乎不問馬孟子曰廐有肥馬民有饑色野有餓莩此率獸而食人也聖人貴人賤物如此饑荒之年其忍以菽粟給馬哉祥符中澶州上言民訴水旱二十畝以下求蠲租者所傷不多望勿受其訴真宗曰若此貧民田少者常不及矣朕以灾沴蠲租正為貧民下户豈以多少為限耶獨慮諸州不曉此意當徧戒之煟曰自田制壊而兼并之法行貧民下户極多而中産之家賑貸之所不及一遇水旱狼狽無䇿祗有流離餓莩耳今真宗以災沴蠲租正為貧民下户此非聖謨宏逺灼見閭閻之病乎大中祥符詔江淮𤼵運司嵗留上供米五千石以備饑年賑濟煟曰祖宗之時上供之米猶每歳截留以備賑濟則常平義倉無所吝惜可知矣然則祥符之詔可不端拜而大書乎仁宗初即位乾興元年十二月以京城穀價翔貴出常平倉米分十四場賤糶以濟貧民慶歴元年十一月以京城穀價湧貴𤼵廩一百萬石減價出糶以濟貧民四年正月詔陜西榖價翔貴其令轉運司出常平倉米减價以濟貧民皇祐三年十二月癸巳詔曰天下常平倉其依元糴價糶以濟貧民毋得収餘利以希恩賞煟曰昔蘇軾論救荒大計全在廣糶常平斛斗若乗艱食之際便行減價出糶平凖在市米價則人皆受賜亦可免流移之灾此外更無長策若巡門俵米攔街散粥終無救於饑饉其俵散之利所及者狹不如出糶之利所及者廣也觀此則知蘓軾所論真得祖宗之遺意但當推行村落尤為盡善盡美耳仁宗嘗謂頃者江南嵗饑貸民種糧數十萬斛且屢經倚閣而轉運督責不已民貧不能自償昨遣使安撫始以事聞不爾則民間之弊無由上達其悉蠲之煟曰李沆為相毎奏對嘗以四方水旱盜賊為言范仲淹為江淮宣撫使見民間以蝗蟲和野菜煮食即日取以奏御乞宣示六宮非特下情當上達亦誠相業所當為也天禧元年四月濮州侯日成上言本州富民儲蓄斛㪷不少近來不住増其價直乞差使臣與通判㸃檢逐户數目量留一年之費外依祥符八年秋時毎斛上収錢十五文省盡令出糶以濟貧民詔只依前後勅㫖勸誘出糶餘不得行慮擾民也煟曰富民有米本欲糶錢官司迫之愈見藏匿須當有術以出之其術謂何臣於勸分抑價篇論之詳矣然則祖宗不從日成上言真識大體天聖七年閏二月詔河北轉運司契丹流民其令分送唐鄧襄汝州以閒田處之並令所過日人給米二升初河北轉運司言契丹歳大饑民流過界河上謂輔臣曰雖境外之民皆是朕之赤子也可賑救之故降是詔煟曰境外之民一遇饑歉流徙過界仁皇尚且賑救之聖度廣大如此况同路同郡之民為守令者其可不加意乎天聖七年六月河北大水壞澶州浮橋七月命三司刑部郎中鍾離瑾為河北安撫使仍詔瑾所至𤼵官廩以賑貧之其被溺之家見存三口者給錢二千不及者半之溺死而不能収歛者官為瘞埋已檢放稅外聽近輸官權停州縣配率其經水倉庫營壁亟修全之卑下者徙髙阜處水損官物先為給遣坊監亡失官馬者更不加罪止令根究所部官吏貪暴不能存恤者奏劾之見繫獄囚委長吏從輕决遣其備邊事機民間疾苦悉具經畫以聞煟曰祖宗救灾非特旱傷禱祈蠲減而已凡大水卒然而至漂蕩民廬浸濕官廩其賑恤經畫之方尤為詳悉真可端拜為矜式也慶歴四年二月遣内侍齎奉宸庫銀三萬兩下陜西博糴穀麥以濟饑民煟曰水旱先𤼵常平賑糶義倉賑濟度其不足則預覔度牒借内庫錢於豐熟去處循環糶糴以濟饑民祖宗未嘗吝惜今為守令者不知典故惟以等第科抑使出米賑糶不知饑荒之年中産之家自不給足安能有餘賑糶哉慶厯七年以旱避正殿詔中外臣僚指陳當世切務又下詔曰咎自朕致民實何愆與其降咎於人不若降灾於朕辛丑祈雨炎日却葢不御是歲江東大饑運使楊絃𤼵義倉以賑之吏欲取㫖絃謂吏曰國家置義倉本慮凶嵗今須㫖而𤼵人將殍死上聞乃褒之煟曰楊逸為光州刺史荒歉連歳以倉粟賑給有司難之逸曰國以人為本人以食為天以此獲戾乃所甘心韓韶為嬴長他縣流民入界韶聞之乃開倉賑救主藏者争之韶曰長活溝壑之民以此獲罪又何歉祖宗毎遇水旱憂懼如此今絃不俟取㫖而𤼵義倉誠得二子之用心仁宗毎見天下有奏災傷州郡必加存恤嘉祐中河北蝗澇時霸州文水縣不依編勅告示灾傷百姓狀訴及本州不以時差官檢視轉運以為言上曰朝廷之政寄於郡縣郡縣之政寄於守令守宰之官最為親民民無災傷尚當存恤况有災傷而不為管理豈有心於恤民乎主簿趙師錫罰銅九斤司户晁舜之錄事叅軍周約判官馮泌各罰銅八斤通判王嘉錫罰銅七斤知縣雷守臣衝替上謂左右曰所以必行罰者欲使天下官吏知朝廷恤民之意煟曰祖宗之時州縣災傷不時差官檢踏雖主簿司户至㣲之官姓名亦徹於上至勞聖㫁責罰可見下情無壅聖主留意饑民如是也熈寧間上以乆旱憂見容色毎輔臣進見未嘗不嗟嘆懇惻盡罷保甲方田等事以謂地力亦荒政急務宜即施行王安石曰水旱常數堯湯所不免陛下即位以來累年豐稔今之旱暵但當益修人事以應天灾不足貽聖慮上曰此豈細事朕今所以恐懼者正為人事有所未修也於是中書條奏請蠲減賑恤煟曰神宗皇帝毎遇水旱憂見容色至云此豈小事聖主憂民誠篤如此社稷安得不乆長哉熈寧間京師乆旱下求直言之詔其略曰朕之聽納有不得於理歟獄訟非其情歟賦歛失其節歟忠謀讜言鬱於上聞而阿諛壅蔽以成其私者衆歟詔出人情大悦是日乃雨煟曰謹按是時韓維知制誥京師旱上曰天乆不雨朕夙夜焦勞奈何維曰陛下憂憫災傷損膳避殿此乃舉行故事恐不足以應天變書曰惟先格王正厥事近日畿内諸縣督索青苖錢甚急往往鞭撻取足至伐桑為薪以易錢貨旱傷之際重罹此苦願陛下𤼵自英㫁過而飬人不猶愈於過而殺人也神宗感悟遂下詔熈寧七年正月河陽灾傷常平倉賑濟斛斗不足乞更𤼵省倉詔賜常平榖萬石興修水利以賑濟饑民六月詔常平倉司衛州封樁糧四萬九千餘石貸共城獲嘉等三縣中等闕食户煟曰以常平榖萬石興修水利以濟饑民此以工役救荒者也凶年饑歳上户力厚可以無饑下户賑濟粗可以免饑惟中等之户力旣不逮賑又不及最為狼狽今以數萬石貸中等户國家救荒允愜人情如此熈寧八年正月詔曰方農作時雨雪頗足流民所在令州縣曉諭丁壯各願歸鄉者並聽保結經所属給糧毎程人給米豆一升㓜者半之婦女凖此州縣毋輒強逐煟曰近年江浙流移之民過淮上者接踵於道暨至失所悔恨欲歸無策憂愁而死者不可勝數然則熈寧之詔州縣宜傚之以為法熈寧八年三月上批沂州淮陽軍灾傷特甚百姓不惟闕食農乏穀種田事殆廢粒食絶望糾集為盜者多實可矜閔若不優加賑恤恐轉至連結羣黨難以擒捕䧟溺其良民投之死地可速議所以賑恤之遂詔京東路轉運提舉司𤼵常平錢省倉米等給散孤貧户聽差待闕得替官就村依乞人例賑濟道殣無主官為収瘞之煟曰凶年饑嵗細民得錢亦可雜置他物以充饑膓神宗詔𤼵常平錢并省倉米等第給散葢慮米不給足而繼之以錢真得救荒之活法然國家所失者財用而所得者人心陸贄之言惟神宗得之政和七年九月手詔州縣遏糴以私境内殊失惠養元元之意自今有犯必罰無赦煟曰嘉祐四年詔諸路運司凡鄰路災傷而輒閉糴者以違制坐之至此復有是詔非州縣不能奉行盖俗吏識見淺狹者多也建炎二年七月十九日御批大水飛蝗為害最重之處仰百姓自陳州縣監司次第保明奏聞量輕重與免租税煟曰水旱檢放止免田租而已今御批欲與免税政合唐人免調之意髙宗真中興聖主哉紹興中福建帥臣奏乞措置拯濟事髙宗曰拯濟為貧民近世拯濟止及城郭市井之内而鄉村之逺者未嘗及之須令措置州下縣縣下之鄉雖幽僻去處亦分委官屬必躬必親則貧民霑實惠矣煟曰賑濟當及鄉村嘗於義倉論之詳矣然嘗聞蜀道冦作臨汝侯嘲羅研曰卿蜀人何樂禍如此研曰蜀中百家為村有食者不過數家貧迫之人十常八九束縳之吏十有二三各令有五母雞一母彘牀上有百錢甑中有數升麥飯雖蘇張巧説於前韓白按劍於後將不能一夫為盜葢賑濟不及村落其弊如此髙宗論拯濟謂幽僻去處亦分委官屬必躬必親所謂不出户庭而周知天下者歟紹興間户部尚書韓仲通乞以上供之米所餘之數嵗樁一百萬石别廩貯之遇水旱則助軍糧及減収糴號豐儲倉詔從之上曰所儲遇水旱誠為有補非細事也煟曰豐儲乃上供所餘本備水旱助軍食耳後之經國用者倘遇水旱可不明立倉之本意哉紹興二十八年平江紹興湖秀諸處被水欲除下户積欠宰執擬令户部具有無損嵗計上曰止令具數便於内庫撥還朕平時無妄費所積本欲備水旱爾本是民間錢却為民間用復何所惜煟曰王者以天下為家不以私藏為意也髙宗撥内庫錢除被水下户之積欠且曰本是民間錢却為民間用復何所惜真王者之度歟紹興戊寅户部侍郎趙令衿請將州縣義倉陳米出糶右僕射沈該等言義倉米在法不應糶糴恐失預備上曰逐郡自有米數若量糶十之三樁其價次年復糴亦何所損煟曰義倉本民間所寄在法不當糶錢但太陳腐則不可食髙宗令樁其價次年復糴與今之糶錢移用者有間矣紹興間詔義倉之設所以備凶荒水旱又曰祖宗義倉以待水旱最為良法州縣奉行不䖍寖失本意或遇水旱何以賑救可令監司檢視實數補還侵失煟曰屢言義倉本民間以義掊率寄之於官凶荒水旱直以還民不宜認為已物吝而不𤼵也髙宗詔義倉之設所以備凶荒水旱又令檢視實數補還侵失大哉王言矣孝宗乾道御筆有今春閩中艱食朕甚念之向時諸處賑濟多止及於城郭而不及鄉村甚為未均卿等一一奏來煟曰韓愈詩云前年闗中旱閭井多死饑我欲進短策無由到丹墀聶夷中亦云我願君王心化作光明燭不照羅綺筵只照逃亡屋葢傷上之人不恤下也今孝宗慮賑濟未均不及村落令卿等一一奏來豈有下情之不上達哉乾道七年饒州旱傷措畫賑濟米本州義倉八萬餘石又撥附近州縣義倉五萬石并截留在州樁管上供米三萬石及獻助米二千石并立賞格勸諭上户出米措置賑糶知饒州王秬劄子借㑹子五萬貫接續収糴米麥之類得㫖依江州旱傷亦措置撥本州義倉米四千餘石又截上供米六千五百餘石勸誘到上户認糶米二萬八千六百餘石截留贑州起到一萬石賑糴本錢四萬餘貫作本収糴米斛又撥本路常平米十萬石吉筠等州見起赴建康府米八萬餘石樁管米六萬七千餘石煟曰救饑截留本州樁管上供及借㑹子収糴米麥賑糶皆所當行然非主聖則事多齟齬孝宗以天下生靈為心略無難色然則萬世人主宜以為法也乾道九年詔江淮閩浙或荐告饑意者水利不修失所以為旱備朕將即官吏勤惰行殿最各殫厥心毋蹈後悔煟曰水利凡農民之與税户自知留心不待上之人加勸而後始興也但農夫毎患貧而無力稅户雖助之然工用終不堅實古人春省耕而補不足意者亦留意於斯歟淳熈令課利場務經災傷者各隨夏秋限依所放分數於租額除豁煟曰當歉歳民窮於財而百事減省課利場務安得如舊臣竊觀本朝熈寧八年灾傷最甚放苖米一百三十萬石而酒課虧減亦六七十萬餘貫此可槩見自髙宗中興之後陳亨伯等議立經緫制窠名而大抵多出酒税茶鹽與夫税賦之所入自紹興三十年臣僚建請始為定額行下諸路提刑司毎嵗如數拘催不管拖欠其𤼵納有限其䟎辦有賞其違欠有罰自立額之後至凶年饑嵗而有司督辦益峻而民始以為病矣孝宗著入令中而州縣雖遇灾傷不聞舉行盖不知本末源流也淳熈九年兩降指揮諸路官司不許遏糴多出文榜曉諭如敢違戾令總司覺察申奏煟曰本朝列聖一有水旱皆避内殿減膳徹樂或出宮人理寃獄此皆得古聖人用心孝宗尤切惓惓焉宜其享國長乆恩徳在人雖千百世而未艾也救荒活民書卷上
